<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#070b09">
  <title>FA Staff — conexão necessária</title>
  <style>
    :root{color-scheme:dark;font-family:Outfit,system-ui,sans-serif;background:#070b09;color:#eff3ed}
    *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 0,rgba(98,220,145,.08),transparent 38%),#070b09}
    main{width:min(100%,580px);padding:34px;border:1px solid rgba(239,243,237,.11);border-radius:24px;background:#0e1511;box-shadow:0 32px 100px rgba(0,0,0,.34)}
    img{width:46px;height:46px;border-radius:12px}p:first-of-type{margin-top:25px;color:#62dc91;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:10px 0 14px;font-size:clamp(30px,7vw,48px);line-height:1;letter-spacing:-.05em}p{color:#99a59c;line-height:1.65}button{min-height:48px;margin-top:14px;padding:0 18px;border:0;border-radius:11px;background:#62dc91;color:#071008;font:inherit;font-weight:800;cursor:pointer}:focus-visible{outline:3px solid #e5b862;outline-offset:4px}
  </style>
</head>
<body>
  <main>
    <img src="assets/images/app-icons/icon-192.png" alt="" width="192" height="192">
    <p>FA Staff</p>
    <h1>O painel precisa de conexão.</h1>
    <p>Dados administrativos não são exibidos a partir de cache. Reconecte-se para consultar o estado atual e executar operações com segurança.</p>
    <button id="retry" type="button">Tentar novamente</button>
  </main>
  <script>document.getElementById('retry').addEventListener('click',()=>location.reload());</script>
</body>
</html>

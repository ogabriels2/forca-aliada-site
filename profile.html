<style>
:root {

  --shadow-md: 0 12px 34px rgba(16,24,40,.09), 0 1px 0 rgba(255,255,255,.82) inset;
  --shadow-lg: 0 26px 80px rgba(16,24,40,.16);
  --ease: cubic-bezier(.16,1,.3,1);
  --t-fast: .14s;
}

[data-theme="dark"] {
  color-scheme: dark;
  --bg: #090d14;
  --bg-2: #101826;
  --surface: rgba(18,25,38,.86);
  --surface-solid: #121926;
  --surface-soft: #172033;
  --ink: #f4f7fb;
  --ink-2: #c4cedb;
  --ink-3: #8b98aa;
  --line: rgba(255,255,255,.11);
  --line-strong: rgba(255,255,255,.18);
  --accent: #6ea8ff;
  --accent-2: #46c3b2;
  --accent-soft: rgba(110,168,255,.14);
  --danger: #ff6b60;
  --danger-soft: rgba(255,107,96,.14);
  --success: #47c982;
  --warning: #ffb454;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.28);
  --shadow-md: 0 14px 38px rgba(0,0,0,.34);

* { box-sizing: border-box; }
html { min-height: 100%; scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100%;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 330px, var(--bg));
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button, textarea, input { font: inherit; }
button { border: 0; }
:where(a,button,textarea,input):focus-visible {
  outline: 3px solid color-mix(in srgb, var(--accent) 42%, transparent);
  outline-offset: 3px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  height: 64px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--surface-solid) 82%, transparent);
  backdrop-filter: blur(22px) saturate(170%);
}
.topbar-inner {
  width: min(1180px, calc(100% - 32px));
  height: 100%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 900; }
.brand img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }
.brand span { display: grid; line-height: 1.05; }
.brand small { margin-top: 2px; color: var(--ink-3); font-size: 10px; text-transform: uppercase; letter-spacing: .11em; }
.top-actions { display: flex; align-items: center; gap: 8px; }

.btn {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 15px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 850;
  cursor: pointer;
  transition: transform var(--t-fast) var(--ease), border-color var(--t-fast), background var(--t-fast), color var(--t-fast), opacity var(--t-fast);
}
.btn:hover { transform: translateY(-1px); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn.primary { color: #fff; background: linear-gradient(135deg, var(--accent), #0d4fc7); box-shadow: 0 12px 24px rgba(23,97,240,.26); }
.btn.secondary { border: 1px solid var(--line); background: var(--surface-solid); color: var(--ink-2); }
.btn.ghost { background: transparent; color: var(--ink-2); }
.btn.danger { border: 1px solid color-mix(in srgb, var(--danger) 34%, transparent); background: var(--danger-soft); color: var(--danger); }
.icon-btn {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-solid);
  color: var(--ink-2);
  cursor: pointer;
}
.icon-btn svg { width: 17px; height: 17px; }

.shell {
  width: min(1180px, calc(100% - 32px));
  margin: 22px auto 70px;
  display: grid;
  gap: 14px;
}
.loading-card, .empty-card {
  padding: 34px 22px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--surface);
  color: var(--ink-2);
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.empty-card h1, .empty-card h2 { margin: 0 0 8px; color: var(--ink); font-size: 24px; letter-spacing: -.02em; }
.empty-card p { margin: 0; line-height: 1.5; }

.profile-hero {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--surface);
  box-shadow: var(--shadow-md);
}
.cover {
  min-height: 80px;
  height: 152px;
  position: relative;
  background: linear-gradient(135deg, #667085, #d0d5dd);
  overflow: hidden;
  z-index: 1;
}
.cover.has-img {
  height: auto;
}
.cover-img {
  width: 100%;
  height: auto;
  display: block;
  position: relative;
  z-index: 1;
}
.cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, transparent, rgba(0,0,0,.16)),
    url("data:image/svg+xml,%3Csvg width='44' height='44' viewBox='0 0 44 44' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='0.055'%3E%3Crect x='0' y='0' width='22' height='22'/%3E%3Crect x='22' y='22' width='22' height='22'/%3E%3C/g%3E%3C/svg%3E");
}
.cover.ouro { background: linear-gradient(135deg, #78350f, #f59e0b 50%, #fef3c7); }
.cover.diamante { background: linear-gradient(135deg, #064e3b, #0e9384 50%, #a7f3d0); }
.cover.netherite { background: linear-gradient(135deg, #1e1b4b, #7c3aed 52%, #4c1d95); }
.cover.staff { background: linear-gradient(135deg, #1e3a8a, var(--accent) 52%, #bfdbfe); }
.hero-body { padding: 0 18px 18px; position: relative; z-index: 2; }
.hero-row {
  position: relative;
  z-index: 3;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-top: -48px;
}
.identity { min-width: 0; display: flex; align-items: flex-end; gap: 14px; position: relative; }
.avatar {
  width: 96px;
  height: 96px;
  flex: 0 0 auto;
  border: 5px solid var(--surface-solid);
  border-radius: 22px;
  object-fit: cover;
  background: var(--surface-soft);
  box-shadow: 0 0 0 3px var(--accent), 0 0 0 7px var(--accent-soft), var(--shadow-lg);
}
.identity-text { min-width: 0; padding-bottom: 5px; position: relative; z-index: 2; }
.avatar { position: relative; z-index: 1; flex-shrink: 0; }
.name-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
h1 { margin: 0; font-size: clamp(30px, 5vw, 43px); line-height: .98; font-weight: 930; letter-spacing: -.04em; word-break: break-word; }
.handle { margin: 7px 0 0; color: var(--ink-2); font-size: 14px; font-weight: 750; }
.rank-pill {
  display: inline-flex;
  align-items: center;
  min-height: 25px;
  padding: 0 10px;
  border: 1px solid color-mix(in srgb, var(--rank) 26%, transparent);
  border-radius: 999px;
  background: color-mix(in srgb, var(--rank) 13%, transparent);
  color: var(--rank);
  font-size: 12px;
  font-weight: 900;
}
.rank-pill:empty { display: none; }
.profile-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; padding-bottom: 8px; }
.bio {
  max-width: 760px;
  margin: 10px 0 0;
  color: var(--ink-2);
  font-size: 14px;
  line-height: 1.45;
}
.stats {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 7px;
  margin-top: 12px;
}
.stat {
  min-height: 56px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--surface-soft);
  color: inherit;
  text-align: left;
}
button.stat { cursor: pointer; transition: border-color var(--t-fast), background var(--t-fast), transform var(--t-fast) var(--ease); }
button.stat:hover { transform: translateY(-1px); border-color: var(--accent); background: var(--accent-soft); }
.stat strong { display: block; font-size: 17px; font-weight: 930; letter-spacing: -.02em; }
.stat span { display: block; margin-top: 2px; color: var(--ink-3); font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; }

.content-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 14px;
  align-items: start;
}
.main-feed, .side-stack { min-width: 0; display: grid; gap: 11px; }
.section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.section-head strong { font-size: 15px; font-weight: 930; letter-spacing: -.02em; }
.section-head span { color: var(--ink-3); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
.post-list { display: grid; gap: 10px; }
.post {
  min-height: 112px;
  display: grid;
  gap: 10px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform var(--t-fast) var(--ease), border-color var(--t-fast), background var(--t-fast);
}
.post:hover { transform: translateY(-2px); border-color: var(--accent); }
.post p { margin: 0; color: var(--ink); font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; }
.post-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: var(--ink-3); font-size: 12px; font-weight: 750; }
.card, .badge {
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}
.card { padding: 14px; }
.card-label {
  display: block;
  color: var(--ink-3);
  font-size: 10.5px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .09em;
}
.card-value { display: block; margin-top: 5px; font-size: 26px; font-weight: 930; letter-spacing: -.03em; }
.copy { margin: 7px 0 0; color: var(--ink-2); font-size: 13px; line-height: 1.45; }
.bars { height: 54px; display: flex; align-items: end; gap: 5px; margin-top: 13px; }
.bars i { flex: 1; min-height: 5px; border-radius: 999px 999px 0 0; background: linear-gradient(180deg, var(--accent), var(--accent-2)); opacity: .72; }
.badges { display: grid; gap: 8px; }
.badge { padding: 11px; }
.badge strong { display: block; font-size: 13px; font-weight: 850; }
.badge span { display: block; margin-top: 4px; color: var(--ink-2); font-size: 12px; line-height: 1.35; }

.backdrop {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: none;
  place-items: center;
  padding: 20px;
  background: rgba(5,10,20,.55);
  backdrop-filter: blur(14px);
}
.backdrop.show { display: grid; }
.modal {
  width: min(520px, 100%);
  max-height: min(760px, calc(100vh - 40px));
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--line-strong);
  border-radius: 18px;
  background: var(--surface-solid);
  box-shadow: var(--shadow-lg);
}
.modal-head, .modal-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
}
.modal-foot {
  justify-content: flex-end;
}
.modal-head { border-bottom: 1px solid var(--line); }
.modal-head h2 { margin: 0; font-size: 16px; letter-spacing: -.02em; }
.modal-body { min-height: 0; overflow: auto; padding: 14px 16px; }
.modal-foot { border-top: 1px solid var(--line); background: var(--surface-soft); justify-content: flex-end; }
.form-grid { display: grid; gap: 12px; }
.field { display: grid; gap: 7px; color: var(--ink-2); font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: .05em; }
.field textarea {
  min-height: 100px;
  resize: vertical;
  padding: 11px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  outline: none;
  background: var(--surface-soft);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}
.field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 11px 0;
  border-top: 1px solid var(--line);
}
.toggle-row:first-of-type { border-top: 0; }
.toggle-row strong { display: block; font-size: 13.5px; }
.toggle-row span { display: block; margin-top: 2px; color: var(--ink-2); font-size: 12.5px; line-height: 1.35; }
.rel-list { display: grid; gap: 8px; }
.rel-row {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface-soft);
}
.rel-row:last-child { border-bottom: none; }
.rel-row img { width: 42px; height: 42px; border-radius: 11px; object-fit: cover; }
.rel-row strong { display: block; overflow: hidden; font-size: 13.5px; text-overflow: ellipsis; white-space: nowrap; }
.rel-row small { display: block; overflow: hidden; margin-top: 2px; color: var(--ink-3); font-size: 12px; font-weight: 650; text-overflow: ellipsis; white-space: nowrap; }

/* ─── PROFILE LINKS ─── */
.profile-links{
  display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;
}
.profile-link-item{
  display:inline-flex;align-items:center;gap:5px;
  height:26px;padding:0 10px;
  border:1px solid var(--line);border-radius:999px;
  background:var(--surface-soft);
  color:var(--ink-2);font-size:12px;font-weight:700;
  text-decoration:none;
  transition:all var(--t-fast);
  max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.profile-link-item:hover{
  border-color:var(--accent);color:var(--accent);background:var(--accent-soft);
  transform:translateY(-1px);
}
.profile-link-item svg{width:12px;height:12px;flex-shrink:0}
/* Link editor in profile editor modal */
.link-editor-list{display:grid;gap:8px;margin-top:6px}
.link-editor-row{
  border:1.5px solid var(--line);border-radius:10px;
  background:var(--surface-soft);
  padding:0;overflow:hidden;
  transition:border-color var(--t-fast);
}
.link-editor-row:focus-within{border-color:var(--accent)}
.link-row-handle{display:grid;grid-template-columns:1fr;gap:0}
.link-row-top{
  display:grid;grid-template-columns:minmax(0,1fr) auto;
  border-bottom:1px solid var(--line);
}
.link-row-bottom{display:grid}
.link-field-input{
  height:36px;padding:0 11px;
  border:none;border-radius:0;
  background:transparent;color:var(--ink);outline:none;
  font:inherit;font-size:12.5px;width:100%;box-sizing:border-box;
}
.link-field-input::placeholder{color:var(--ink-3)}
.link-field-input:focus{background:color-mix(in srgb,var(--accent-soft) 60%,transparent)}
.link-field-label{
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
  color:var(--ink-3);padding:4px 11px 0;line-height:1;
}
.link-editor-row .link-remove-btn{
  width:34px;height:36px;
  display:grid;place-items:center;color:var(--ink-3);cursor:pointer;
  transition:background var(--t-fast),color var(--t-fast);
  background:transparent;border:none;border-left:1px solid var(--line);flex-shrink:0;
}
.link-editor-row .link-remove-btn:hover{background:var(--danger-soft);color:var(--danger)}
.link-editor-row .link-remove-btn svg{width:12px;height:12px}
.link-add-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 0;color:var(--accent);font-size:12px;font-weight:750;cursor:pointer;
  background:none;border:none;margin-top:4px;
}
.link-add-btn:hover{opacity:.78}
.link-add-btn svg{width:13px;height:13px}
.link-add-btn:disabled{opacity:.38;cursor:not-allowed}
.toast-stack { position: fixed; right: 20px; bottom: 20px; z-index: 120; display: grid; gap: 8px; width: min(360px, calc(100vw - 40px)); pointer-events: none; }
.toast {
  padding: 12px 13px;
  border: 1px solid var(--line);
  border-left: 4px solid var(--accent);
  border-radius: var(--r-md);
  background: var(--surface-solid);
  box-shadow: var(--shadow-lg);
  color: var(--ink);
  pointer-events: auto;
}
.toast strong { display: block; font-size: 13px; }
.toast span { display: block; margin-top: 2px; color: var(--ink-2); font-size: 12px; line-height: 1.35; }
.toast.error { border-left-color: var(--danger); }

@media (max-width: 960px) {
  .content-grid { grid-template-columns: 1fr; }
  .side-stack { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 760px) {
  .topbar-inner, .shell { width: min(100% - 22px, 720px); }
  .top-actions .btn.secondary { display: none; }
  .cover { height: 128px; }
  .hero-row { align-items: flex-start; flex-direction: column; }
  .identity { align-items: flex-start; flex-direction: column; gap: 9px; }
  .identity-text { padding-bottom: 0; }
  .profile-actions { justify-content: flex-start; padding-bottom: 0; }
  .avatar { width: 86px; height: 86px; border-radius: 20px; }
  .stats { grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 5px; }
  .stat { min-height: 48px; padding: 7px 5px; }
  .stat strong { font-size: 15px; }
  .stat span { font-size: 7.6px; letter-spacing: .02em; }
  .side-stack { grid-template-columns: 1fr; }
}
@media (max-width: 430px) {
  .btn { min-height: 36px; padding: 0 12px; font-size: 12.5px; }
  .stats { gap: 7px; }
  .stat { min-height: 70px; padding: 10px; }
}
@media (max-width: 760px) {
  html, body { width: 100%; max-width: 100%; overflow-x: clip; }
  .shell, .profile-hero, .hero-body, .content-grid, .main-feed, .side-stack, .card {
    min-width: 0;
    max-width: 100%;
  }
  .profile-hero { overflow: hidden; }
  .profile-actions { width: 100%; flex-wrap: wrap; justify-content: flex-end; }
  .profile-actions .btn { flex: 0 1 auto; min-width: 0; }
  .identity-text, .main-feed, .side-stack { overflow-wrap: anywhere; }

const API_BASES = [...new Set((IS_LOCAL ? [API_BASE, LOCAL_API, PROD] : [window.FA_API_BASE || PROD, PROD]).filter(Boolean))];
const token = localStorage.getItem('fa_token');

const $ = selector => document.querySelector(selector);

function loginUrl(next = `${location.pathname}${location.search}${location.hash}`.replace(/^\//, '')) {
  const cleanNext = next || 'community.html';
  try {
    const payload = JSON.stringify({ path: cleanNext, at: Date.now() });
    sessionStorage.setItem('fa_login_next', payload);
    localStorage.setItem('fa_login_next', payload);
  } catch {}
  const url = new URL('login.html', location.href);
  url.searchParams.set('next', cleanNext);
  return `${url.pathname.replace(/^\//, '')}${url.search}`;
}

function requireLogin(message = 'Entre para continuar') {

function setMeta(name, content, attr = 'name') {
  if (!content) return;
  let el = document.querySelector(`meta[${attr}="${name}"]`);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute(attr, name);
    document.head.appendChild(el);
  }
  el.setAttribute('content', content);
}

function setCanonical(url) {
  let el = document.querySelector('link[rel="canonical"]');
  if (!el) {
    el = document.createElement('link');
    el.rel = 'canonical';
    document.head.appendChild(el);
  }
  el.href = url;
  document.querySelectorAll('link[rel="alternate"][hreflang]').forEach(link => { link.href = url; });
}

function setStructuredData(data) {
  let el = document.querySelector('script[data-dynamic-seo]');
  if (!el) {
    el = document.createElement('script');
    el.type = 'application/ld+json';
    el.dataset.dynamicSeo = '1';
    document.head.appendChild(el);
  }
  el.textContent = JSON.stringify(data);

function esc(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
}
function num(value) {
  return Number(value || 0).toLocaleString('pt-BR');
}
function skin(name, size = 100) {
  return `https://minotar.net/helm/${encodeURIComponent((name || 'Steve').trim() || 'Steve')}/${size}.png`;
}
function profileAvatar(profile, size = 100) {
  const raw = String(profile?.avatar_url || profile?.photo_url || '').trim();
  if (raw) {
    try {
      const url = new URL(raw, location.href);
      const localHttp = location.protocol === 'http:' && ['localhost', '127.0.0.1'].includes(url.hostname);
      if (url.protocol === 'https:' || localHttp) return url.href;
    } catch { /* usa a skin como fallback */ }
  }
  return skin(profileName(profile), size);
}
function formatDate(value) {
  if (!value) return 'data indisponivel';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return 'data indisponivel';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function timeAgo(value) {
  if (!value) return '';
  const d = new Date(value);
  const diff = Math.max(0, (Date.now() - d.getTime()) / 1000);
  if (diff < 45) return 'agora';
  if (diff < 3600) return `${Math.floor(diff / 60)} min`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} h`;
  if (diff < 172800) return 'ontem';
  return formatDate(value);
}
function rankInfo(rank, merit = 0) {
  const id = String(rank || '').toLowerCase();
  if (!id || id === 'limited') return { label: '', color: 'transparent', cls: 'none' };
  if (id.includes('owner')) return { label: 'Dono', color: '#b91c1c', cls: 'owner' };
  if (id.includes('adm') || id.includes('full') || id.includes('admin') || id.includes('staff')) return { label: 'Adm', color: '#1761f0', cls: 'staff' };
  if (id.includes('netherite') || merit >= 1000) return { label: 'Netherite', color: '#7c3aed', cls: 'netherite' };
  if (id.includes('diamante') || merit >= 500) return { label: 'Diamante', color: '#0e9384', cls: 'diamante' };
  if (id.includes('ouro') || merit >= 150) return { label: 'Ouro', color: '#b7791f', cls: 'ouro' };

}

  const headers = new Headers(options.headers || {});
  if (token) headers.set('Authorization', `Bearer ${token}`);

  const timeoutMs = options.timeoutMs || 25000;
  const fetchOptions = { ...options };
  delete fetchOptions.timeoutMs;
  let err;
  for (const base of API_BASES) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(`${base}${path}`, { ...fetchOptions, headers, signal: controller.signal });
      const text = await res.text();
      const data = text ? JSON.parse(text) : {};
      if (!res.ok) throw new Error(data.error || 'Erro na API');
      return data;
    } catch (e) {
      err = e.name === 'AbortError' ? new Error('A API demorou para responder. Tente novamente em alguns segundos.') : e;

    if (!link || !link.url) return '';
    const label = link.label || (link.url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0]) || 'Link';
    return `<a class="profile-link-item" href="${esc(link.url)}" target="_blank" rel="noopener noreferrer" title="${esc(link.url)}">
      ${getLinkIcon(link.url)}
      ${esc(label)}
    </a>`;
  }).filter(Boolean).join('')}</div>`;
}

function renderProfile(data) {
  state.data = data;
  const p = data.profile || {};
  const posts = Array.isArray(data.posts) ? data.posts : [];
  const badges = Array.isArray(data.badges) ? data.badges : [];
  const stats = data.game_stats;
  const name = profileName(p);
  const rank = rankInfo(p.rank || p.role, p.merit);
  const isMe = Number(p.id) === Number(state.me?.id);
  const isGuest = !token;
  const profileUrl = `https://forcaaliada.ogabriels.com/share/profile/${encodeURIComponent(profileIdentifier(p))}`;
  const seoDescription = (p.bio || `${name} na comunidade Forca Aliada. ${num(p.followers_count)} seguidores e ${num(p.posts_count)} posts.`).slice(0, 220);
  setMeta('description', seoDescription);
  setMeta('robots', 'index,follow,max-image-preview:large');
  setMeta('og:title', `${name} | Perfil Forca Aliada`, 'property');
  setMeta('og:description', seoDescription, 'property');
  setMeta('og:type', 'profile', 'property');
  setMeta('og:url', profileUrl, 'property');
  setMeta('og:image', p.avatar_url || p.photo_url || skin(name, 140), 'property');
  setMeta('profile:username', p.username || name, 'property');
  setMeta('og:image:alt', `Avatar de ${name}`, 'property');
  setMeta('twitter:card', 'summary_large_image');
  setMeta('twitter:title', `${name} | Perfil Forca Aliada`);
  setMeta('twitter:description', seoDescription);
  setMeta('twitter:image', p.avatar_url || p.photo_url || skin(name, 140));
  setCanonical(profileUrl);
  setStructuredData({
    '@context': 'https://schema.org',
    '@type': 'ProfilePage',
    url: profileUrl,
    mainEntity: {
      '@type': 'Person',
      name,
      alternateName: p.username ? `@${p.username}` : undefined,
      description: seoDescription,
      image: p.avatar_url || p.photo_url || skin(name, 140),
      url: profileUrl,
    },
  });
  const bars = stats?.daily_hours?.length
    ? stats.daily_hours.map(row => `<i style="height:${Math.max(5, Math.min(54, Number(row.hours || 0) * 12))}px"></i>`).join('')
    : Array.from({ length: 7 }, () => '<i style="height:5px"></i>').join('');
  document.title = `${name} | Forca Aliada`;

  const shareProfileButton = `<button class="btn secondary" type="button" data-share-profile="${esc(profileIdentifier(p))}">Compartilhar</button>`;
  const actionHtml = isMe
    ? `<button class="btn primary" type="button" data-edit-profile>Editar perfil</button><a class="btn secondary" href="account.html">Conta</a>${shareProfileButton}`
    : isGuest
      ? `<a class="btn primary" href="${esc(loginUrl())}">Entrar para interagir</a>
         <a class="btn secondary" href="community.html">Ver comunidade</a>
         ${shareProfileButton}`
    : `<button class="btn primary" type="button" data-follow="${esc(p.id)}" data-on="${p.is_following ? '1' : '0'}" ${p.is_blocked_by_me ? 'disabled' : ''}>${p.is_blocked_by_me ? 'Bloqueado' : p.is_friend ? 'Amigo' : p.is_following ? 'Seguindo' : 'Seguir'}</button>
       <button class="btn secondary" type="button" data-message="${esc(p.id)}" data-name="${esc(name)}">${icon.chat} Mensagem</button>
       <button class="btn secondary" type="button" data-report="${esc(p.id)}">${icon.flag} Denunciar</button>
       <button class="btn danger" type="button" data-block="${esc(p.id)}" data-unblock="${p.is_blocked_by_me ? '1' : '0'}">${p.is_blocked_by_me ? 'Desbloquear' : 'Bloquear'}</button>
       ${shareProfileButton}`;

  const statHtml = (type, count, label) => token
    ? `<button class="stat" type="button" data-rel="${type}"><strong>${num(count)}</strong><span>${label}</span></button>`
    : `<div class="stat"><strong>${num(count)}</strong><span>${label}</span></div>`;

  $('#app').innerHTML = `
    <section class="profile-hero">
      <div class="cover ${rank.cls}${p.cover_url ? ' has-img' : ''}" id="profile-cover-el">${
        p.cover_url ? `<img src="${esc(p.cover_url)}" alt="" class="cover-img" onerror="this.style.display='none';this.closest('.cover').classList.remove('has-img')">` : ''
      }</div>
      <div class="hero-body">
        <div class="hero-row">
          <div class="identity">
            <img class="avatar" src="${esc(profileAvatar(p, 140))}" alt="Avatar de ${esc(name)}" onerror="this.onerror=null;this.src='${skin(name, 140)}'">
            <div class="identity-text">
              <div class="name-row"><h1>${esc(name)}</h1>${rankPillHTML(rank)}</div>
              <p class="handle">@${esc(p.username || name)} · membro desde ${esc(formatDate(p.created_at))}${data.follow_since ? ` · seguindo desde ${esc(formatDate(data.follow_since))}` : ''}</p>
            </div>
          </div>
          <div class="profile-actions">${actionHtml}</div>
        </div>
        <p class="bio">${esc(p.bio || (isMe ? 'Adicione uma descricao para ajudar outros jogadores a conhecerem voce.' : 'Sem bio publica por enquanto.'))}</p>
        ${renderProfileLinks(p.profile_links)}
        <div class="stats">
          ${statHtml('followers', p.followers_count, 'Seguidores')}
          ${statHtml('following', p.following_count, 'Seguindo')}
          ${statHtml('friends', p.friends_count, 'Amigos')}
          <div class="stat"><strong>${num(p.posts_count)}</strong><span>Posts</span></div>
          <div class="stat"><strong>${num(p.merit)}</strong><span>Merito</span></div>
        </div>
      </div>
    </section>
    <section class="content-grid">
      <section class="main-feed">
        <div class="section-head"><strong>Posts recentes</strong><span>${num(posts.length)} visiveis</span></div>
        <div class="post-list">
          ${posts.length ? posts.map(post => `
            <article class="post" data-post="${esc(post.id)}">
              <p>${mentionHTML(post.content)}</p>
              <div class="post-meta">
                <span>${esc(timeAgo(post.created_at))}</span>
                <span>${num(post.likes_count)} likes</span>
                <span>${num(post.comments_count)} respostas</span>
              </div>
            </article>
          `).join('') : `<div class="empty-card"><h2>Nenhum post publico</h2><p>${isMe ? 'Publique algo na comunidade para preencher seu perfil.' : 'Quando este jogador publicar, os posts aparecem aqui.'}</p></div>`}
        </div>
      </section>
      <aside class="side-stack">
        <div class="card">
          <span class="card-label">Servidor</span>
          <strong class="card-value">${stats ? `${num(Number(stats.total_hours || 0).toFixed(1))}h` : 'Privado'}</strong>
          <p class="copy">${stats?.last_seen ? `Ultima atividade: ${timeAgo(stats.last_seen)}.` : 'Historico oculto ou sem sessoes recentes.'}</p>
          <div class="bars">${bars}</div>
        </div>
        <div class="card">
          <span class="card-label">Rank atual</span>
          <strong class="card-value" style="color:${rank.color}">${esc(rank.label)}</strong>
          <p class="copy">${esc((p.rank_benefits || []).join(' · ') || 'Progresso inicial da comunidade.')}</p>
        </div>
        <div class="card">
          <span class="card-label">Capital</span>
          <strong class="card-value">${num(p.capital)}</strong>
          <p class="copy">Economia e participacao acumuladas na comunidade.</p>
        </div>
        <div class="badges">
          <div class="section-head"><strong>Conquistas</strong><span>${num(badges.length)}</span></div>
          ${badges.length ? badges.map(badge => `<div class="badge" title="${esc(badge.description)}"><strong>${esc(badge.label)}</strong><span>${esc(badge.description)} · ${num(badge.progress)}%</span></div>`).join('') : '<div class="empty-card"><p>Nenhuma conquista ainda.</p></div>'}
        </div>
      </aside>
    </section>`;
}

async function toggleFollow(userId, button) {
  if (!userId || !button || button.disabled) return;
  const currently = button.dataset.on === '1';
  const next = !currently;
  const old = button.textContent;
  button.dataset.on = next ? '1' : '0';
  button.textContent = next ? 'Seguindo' : 'Seguir';
  button.disabled = true;
  try {
    await api(`/api/me/follows/${encodeURIComponent(userId)}`, { method: currently ? 'DELETE' : 'POST' });
    const profile = state.data?.profile;
    if (profile && Number(profile.id) === Number(userId)) {
      profile.is_following = next;
      profile.followers_count = Math.max(0, Number(profile.followers_count || 0) + (next ? 1 : -1));
      if (profile.is_friend && !next) profile.is_friend = false;
      renderProfile(state.data);
    }
  } catch (e) {
    button.dataset.on = currently ? '1' : '0';
    button.textContent = old;
    toast('Acao nao concluida', e.message, 'error');
  } finally {
    button.disabled = false;
  }
}
async function blockUser(userId, unblock) {
  try {
    await api(`/api/me/blocks/${encodeURIComponent(userId)}`, { method: unblock ? 'DELETE' : 'POST' });
    toast(unblock ? 'Usuario desbloqueado' : 'Usuario bloqueado');
    setTimeout(() => location.reload(), 500);
  } catch (e) {
    toast('Acao nao concluida', e.message, 'error');
  }
}
async function reportUser(userId) {
  try {
    await api('/api/community/report', { method: 'POST', body: JSON.stringify({ content_type: 'user', content_id: Number(userId), reason: 'other' }) });
    toast('Denuncia enviada', 'Obrigado por ajudar a manter a comunidade organizada.');
  } catch (e) {
    toast('Denuncia nao enviada', e.message, 'error');
  }
}

// ── Links editor state ──
let _editLinks = [];

function renderLinkEditor() {
  const list = $('#link-editor-list');
  const addBtn = $('#add-link-btn');
  const countLabel = $('#links-count-label');
  if (!list) return;
  countLabel && (countLabel.textContent = `${_editLinks.length} / 5`);
  addBtn && (addBtn.disabled = _editLinks.length >= 5);

  list.innerHTML = _editLinks.map((lk, i) => `
    <div class="link-editor-row" data-link-idx="${i}">
      <div class="link-row-handle">
        <div class="link-row-top">
          <div>
            <div class="link-field-label">Título exibido</div>
            <input class="link-field-input" type="text" maxlength="40"
              placeholder="ex: Meu YouTube"
              value="${esc(lk.label || '')}"
              data-lk-label="${i}" autocomplete="off">
          </div>
          <button class="link-remove-btn" type="button" data-lk-remove="${i}" aria-label="Remover link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="link-row-bottom">
          <div class="link-field-label">URL</div>
          <input class="link-field-input" type="url" maxlength="300"
            placeholder="https://..."
            value="${esc(lk.url || '')}"
            data-lk-url="${i}" autocomplete="off">
        </div>
      </div>
    </div>`).join('');

  // Live-sync inputs
  list.querySelectorAll('[data-lk-label]').forEach(inp => {
    inp.addEventListener('input', () => { _editLinks[Number(inp.dataset.lkLabel)].label = inp.value; });
  });
  list.querySelectorAll('[data-lk-url]').forEach(inp => {
    inp.addEventListener('input', () => { _editLinks[Number(inp.dataset.lkUrl)].url = inp.value; });
  });
  list.querySelectorAll('[data-lk-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      _editLinks.splice(Number(btn.dataset.lkRemove), 1);
      renderLinkEditor();
    });
  });
}

async function openEditor() {
  try {
    const prefs = await api('/api/me/preferences');
    const profile = state.data?.profile || {};
    // Display name
    const nameInput = $('#edit-display-name');
    if (nameInput) nameInput.value = prefs.display_name ?? profile.display_name ?? '';
    // Bio
    const bioEl = $('#edit-bio');
    if (bioEl) {
      bioEl.value = prefs.bio ?? profile.bio ?? '';
      const cc = $('#bio-char-count');
      if (cc) cc.textContent = bioEl.value.length + '/160';
    }
    // Checkboxes
    const pubProfile = $('#edit-public-profile');
    const pubHistory = $('#edit-public-history');
    if (pubProfile) pubProfile.checked = Boolean(prefs.public_profile);
    if (pubHistory) pubHistory.checked = Boolean(prefs.public_history);
    // Links
    _editLinks = Array.isArray(prefs.profile_links) ? prefs.profile_links.map(l => ({ label: l.label || '', url: l.url || '' }))
      : Array.isArray(profile.profile_links) ? profile.profile_links.map(l => ({ label: l.label || '', url: l.url || '' }))
      : [];
    renderLinkEditor();
    // Add link button
    const addBtn = $('#add-link-btn');
    if (addBtn) {
      addBtn.onclick = () => {
        if (_editLinks.length < 5) { _editLinks.push({ label: '', url: '' }); renderLinkEditor(); }
      };
    }
    $('#edit-modal').classList.add('show');
    document.body.style.overflow = 'hidden';
    setTimeout(() => $('#edit-display-name')?.focus(), 60);
  } catch (e) {
    toast('Editor indisponivel', e.message, 'error');
  }
}

async function saveEditor() {
  const button = $('#save-profile');
  const displayName = ($('#edit-display-name')?.value || '').trim();
  const bio = ($('#edit-bio')?.value || '').trim();
  const publicProfile = $('#edit-public-profile')?.checked ?? true;
  const publicHistory = $('#edit-public-history')?.checked ?? false;

  // Validate links
  const validLinks = _editLinks.filter(l => l.url && l.url.trim());
  for (const lk of validLinks) {
    try { new URL(lk.url.startsWith('http') ? lk.url : 'https://' + lk.url); }
    catch { toast('Link inválido', 'Verifique os URLs dos seus links.', 'error'); return; }
    if (!lk.url.startsWith('http')) lk.url = 'https://' + lk.url;
  }

  setButtonBusy(button, true, 'Salvando');
  try {
    const current = await api('/api/me/preferences');
    const saved = await api('/api/me/preferences', {
      method: 'PUT',
      body: JSON.stringify({
        ...current,
        ...(displayName ? { display_name: displayName } : {}),
        bio,
        public_profile: publicProfile,
        public_history: publicHistory,
        profile_links: validLinks,
      }),
    });
    Object.assign(state.data.profile, {
      display_name: saved.display_name ?? displayName,
      bio: saved.bio ?? bio,
      public_profile: saved.public_profile,
      public_history: saved.public_history,
      profile_links: saved.profile_links ?? validLinks,
    });
    closeModals();
    renderProfile(state.data);
    toast('Perfil atualizado', 'Suas informacoes publicas foram salvas.');
  } catch (e) {
    toast('Nao foi possivel salvar', e.message, 'error');
  } finally {
    setButtonBusy(button, false, 'Salvar alteracoes');
  }
}
function closeModals() {
  document.querySelectorAll('.backdrop.show').forEach(modal => modal.classList.remove('show'));
  document.body.style.overflow = '';
}

async function openRelation(type, append = false) {
  if (!token) {
    requireLogin('Entre para ver relacoes');
    return;
  }
  const profile = state.data?.profile;
  if (!profile) return;
  const identifier = state.identifier || profileIdentifier(profile);
  if (!append) {
    state.relation = { type, cursor: null, hasMore: false };
    $('#rel-title').textContent = `${relationLabel(type)} de ${profileName(profile)}`;
    $('#rel-list').innerHTML = Array.from({ length: 4 }, () => '<div class="loading-card" style="padding:18px;border-radius:12px"></div>').join('');
    $('#rel-more').hidden = true;
    $('#rel-modal').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  try {
    const params = new URLSearchParams({ limit: '24' });
    if (state.relation.cursor) params.set('cursor', state.relation.cursor);
    const payload = await api(`/api/community/player/${encodeURIComponent(identifier)}/${type}?${params}`);
    const rows = Array.isArray(payload) ? payload : (payload.rows || []);
    const html = rows.map(relationRow).join('');
    if (append) $('#rel-list').insertAdjacentHTML('beforeend', html);
    else $('#rel-list').innerHTML = html || `<div class="empty-card"><p>Nenhum jogador nesta lista.</p></div>`;
    state.relation.cursor = payload.next_cursor || null;
    state.relation.hasMore = Boolean(payload.has_more || payload.next_cursor);
    $('#rel-more').hidden = !state.relation.hasMore;
  } catch (e) {
    $('#rel-list').innerHTML = `<div class="empty-card"><h2>Lista indisponivel</h2><p>${esc(e.message)}</p></div>`;
  }
}
function relationRow(person) {
  const name = profileName(person);
  const rank = rankInfo(person.rank, person.merit);
  const isMe = Number(person.id) === Number(state.me?.id);
  const following = Boolean(person.followed_by_me);
  const meta = `${rank.label ? `${esc(rank.label)} &middot; ` : ''}@${esc(person.username || name)}`;
  return `
    <div class="rel-row" data-profile="${esc(name)}">
      <img src="${esc(profileAvatar(person, 50))}" alt="${esc(name)}" onerror="this.onerror=null;this.src='${skin(name, 50)}'">
      <div>
        <strong>${esc(name)}</strong>
        <small>${meta}</small>
      </div>
      ${isMe || !token ? '' : `<button class="btn secondary" type="button" data-rel-follow="${esc(person.id)}" data-on="${following ? '1' : '0'}">${following ? 'Seguindo' : 'Seguir'}</button>`}
    </div>`;
}

document.addEventListener('click', event => {
  const post = event.target.closest('[data-post]');
  if (post) { location.href = `post.html?id=${encodeURIComponent(post.dataset.post)}`; return; }

  const rel = event.target.closest('[data-rel]');
  if (rel) { openRelation(rel.dataset.rel); return; }

  const follow = event.target.closest('[data-follow]');
  if (follow) { toggleFollow(follow.dataset.follow, follow); return; }

  const relFollow = event.target.closest('[data-rel-follow]');
  if (relFollow) { toggleFollow(relFollow.dataset.relFollow, relFollow); return; }

  const message = event.target.closest('[data-message]');
  if (message) { window.FAChat?.openWithUser({ id: message.dataset.message, minecraft_name: message.dataset.name }); return; }

  const report = event.target.closest('[data-report]');
  if (report) { reportUser(report.dataset.report); return; }

  const block = event.target.closest('[data-block]');
  if (block) { blockUser(block.dataset.block, block.dataset.unblock === '1'); return; }

  const shareProfile = event.target.closest('[data-share-profile]');
  if (shareProfile) { copyProfileShare(state.data?.profile); return; }

  const profile = event.target.closest('[data-profile]');
  if (profile && !event.target.closest('button')) { window.navigateProfile(profile.dataset.profile); return; }

  if (event.target.closest('[data-edit-profile]')) { openEditor(); return; }
  if (event.target.closest('[data-close-modal]') || event.target.classList.contains('backdrop')) { closeModals(); return; }
});

$('#save-profile').addEventListener('click', saveEditor);
$('#rel-more').addEventListener('click', () => openRelation(state.relation.type, true));
$('#theme-btn').addEventListener('click', () => setTheme());
document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModals();
});

(async function init() {
  try {
    const wanted = currentIdentifier();
    const accountLink = $('#account-link');
    if (!token && accountLink) {
      accountLink.href = loginUrl();
      accountLink.textContent = 'Entrar';
    }
    if (token) {
      state.me = await api('/api/me');
      api('/api/me/preferences').then(prefs => { if (prefs?.theme) applyTheme(prefs.theme); }).catch(() => {});
      state.identifier = wanted === 'me' ? (state.me.minecraft_name || `id:${state.me.id}`) : wanted;
    } else {
      if (wanted === 'me') {
        $('#app').innerHTML = `<section class="empty-card"><h1>Entre para ver seu perfil</h1><p>Depois do login voce volta para esta pagina automaticamente.</p><div style="margin-top:14px"><a class="btn primary" href="${esc(loginUrl())}">Entrar</a><a class="btn secondary" href="community.html">Ver comunidade</a></div></section>`;
        return;
      }
      state.identifier = wanted;
    }
    const endpoint = token
      ? `/api/community/player/${encodeURIComponent(state.identifier)}/full-profile`
      : `/api/public/community/player/${encodeURIComponent(state.identifier)}/full-profile`;
    const data = await api(endpoint);
    renderProfile(data);
  } catch (e) {
    $('#app').innerHTML = `<section class="empty-card"><h1>Perfil indisponivel</h1><p>${esc(e.message)}</p><div style="margin-top:14px">${token ? '' : `<a class="btn primary" href="${esc(loginUrl())}">Entrar</a>`}<a class="btn secondary" href="community.html">Voltar para comunidade</a></div></section>`;
  }
})();

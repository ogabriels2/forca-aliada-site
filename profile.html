<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil | Forca Aliada</title>
<meta name="description" content="Perfil publico gamificado da comunidade Forca Aliada.">
<link rel="preconnect" href="https://forca-aliada-site.onrender.com" crossorigin>
<link rel="preconnect" href="https://minotar.net" crossorigin>
<link rel="stylesheet" href="assets/css/social-chat.css">
<script>
(function(){
  const theme = localStorage.getItem('fa_theme') || 'light';
  const dark = theme === 'dark' || (theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
})();
</script>
<style>
:root {
  color-scheme: light;
  --bg:#f3f6fb; --bg-2:#eaf0f8; --surface:rgba(255,255,255,.86); --surface-solid:#fff; --surface-soft:#f8fafc;
  --ink:#101828; --ink-2:#475467; --ink-3:#98a2b3; --line:rgba(16,24,40,.10); --line-strong:rgba(16,24,40,.16);
  --accent:#1761f0; --accent-2:#0e9384; --accent-soft:rgba(23,97,240,.10); --danger:#d92d20; --danger-soft:rgba(217,45,32,.10);
  --success:#148f54; --warning:#dc7f00; --gold:#b7791f; --purple:#7c3aed; --r-md:14px; --r-lg:20px;
  --shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 0 rgba(255,255,255,.72) inset;
  --shadow-md:0 10px 28px rgba(16,24,40,.09),0 1px 0 rgba(255,255,255,.82) inset;
  --shadow-lg:0 24px 70px rgba(16,24,40,.16); --ease:cubic-bezier(.16,1,.3,1); --t-fast:.14s; --t-med:.24s;
}
[data-theme="dark"] {
  color-scheme: dark; --bg:#090d14; --bg-2:#101826; --surface:rgba(18,25,38,.84); --surface-solid:#121926; --surface-soft:#172033;
  --ink:#f4f7fb; --ink-2:#c4cedb; --ink-3:#8b98aa; --line:rgba(255,255,255,.11); --line-strong:rgba(255,255,255,.18);
  --accent:#6ea8ff; --accent-2:#46c3b2; --accent-soft:rgba(110,168,255,.14); --danger:#ff6b60; --danger-soft:rgba(255,107,96,.14);
  --success:#47c982; --warning:#ffb454; --gold:#f6c66b; --purple:#b692ff; --shadow-sm:0 1px 2px rgba(0,0,0,.28); --shadow-md:0 14px 34px rgba(0,0,0,.34); --shadow-lg:0 28px 80px rgba(0,0,0,.46);
}
*{box-sizing:border-box} html{min-height:100%;scroll-behavior:smooth} body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,var(--bg-2) 0%,var(--bg) 310px,var(--bg));color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none} button{font:inherit;border:0} :where(a,button):focus-visible{outline:3px solid color-mix(in srgb,var(--accent) 48%,transparent);outline-offset:3px}
.topbar{position:sticky;top:0;z-index:10;height:68px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--surface-solid) 78%,transparent);backdrop-filter:blur(22px) saturate(170%)}
.topbar-inner{width:min(1180px,calc(100% - 32px));height:100%;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900}.brand img{width:38px;height:38px;border-radius:10px}.brand span{display:grid}.brand small{color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.actions{display:flex;gap:8px}.btn{min-height:38px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 15px;border-radius:999px;font-size:13px;font-weight:850;cursor:pointer;transition:transform var(--t-fast) var(--ease),border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.btn.primary{color:#fff;background:linear-gradient(135deg,var(--accent),#0d4fc7);box-shadow:0 12px 24px rgba(23,97,240,.26)}.btn.secondary{border:1px solid var(--line);background:var(--surface-solid);color:var(--ink-2)}.btn.danger{border:1px solid color-mix(in srgb,var(--danger) 34%,transparent);background:var(--danger-soft);color:var(--danger)}.btn:hover{transform:translateY(-1px)}
.shell{width:min(1180px,calc(100% - 32px));margin:26px auto 60px;display:grid;gap:16px}.hero{overflow:hidden;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--shadow-md)}
.cover{height:210px;background:linear-gradient(135deg,#64748b,#d0d5dd)}.cover.ouro{background:linear-gradient(135deg,#92400e,#f6c66b,#fff3bf)}.cover.diamante{background:linear-gradient(135deg,#0e9384,#22c55e,#b7f7e6)}.cover.netherite{background:linear-gradient(135deg,#24113f,#7c3aed,#15101f)}.cover.staff{background:linear-gradient(135deg,#0d4fc7,#1761f0,#46c3b2)}
.hero-body{padding:0 22px 22px}.hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:-66px}.avatar{width:132px;height:132px;border-radius:29px;border:6px solid var(--surface-solid);object-fit:cover;background:var(--surface-soft);box-shadow:0 0 0 3px var(--accent),0 0 0 7px var(--accent-soft),var(--shadow-lg)}
h1{margin:16px 0 4px;font-size:40px;line-height:.95;font-weight:900;letter-spacing:-.03em}.handle{margin:0;color:var(--ink-2);font-size:14px;font-weight:750}.bio{margin:14px 0 0;color:var(--ink-2);font-size:15px;line-height:1.55}.rank-pill{display:inline-flex;align-items:center;min-height:24px;padding:0 10px;border-radius:999px;color:var(--rank);background:color-mix(in srgb,var(--rank) 13%,transparent);border:1px solid color-mix(in srgb,var(--rank) 22%,transparent);font-size:12px;font-weight:900;text-transform:capitalize}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:18px}.stat{min-height:76px;padding:12px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface-soft);text-align:left}.stat strong{display:block;font-size:20px}.stat span{display:block;margin-top:5px;color:var(--ink-3);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.grid{display:grid;grid-template-columns:minmax(0,.75fr) minmax(0,1.25fr) minmax(230px,.72fr);gap:14px}.card,.post,.badge{border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface);box-shadow:var(--shadow-sm)}.card{padding:15px}.card span,.section-title{color:var(--ink-3);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.card strong{display:block;margin-top:5px;font-size:25px}.copy{color:var(--ink-2);font-size:13px;line-height:1.45}
.bars{display:flex;align-items:end;gap:5px;height:54px;margin-top:12px}.bars i{flex:1;min-height:4px;border-radius:999px 999px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent-2))}
.posts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.post{min-height:132px;padding:13px;cursor:pointer}.post p{display:-webkit-box;margin:0 0 12px;overflow:hidden;font-size:14px;line-height:1.45;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:pre-wrap}.post small{color:var(--ink-3);font-weight:800}.badge{padding:11px}.badge strong{font-size:13px}.badge span{display:block;margin-top:4px;color:var(--ink-2);font-size:12px}.stack{display:grid;gap:8px}.empty{padding:34px 22px;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);text-align:center;color:var(--ink-2)}
.toast{position:fixed;right:20px;bottom:20px;z-index:40;width:min(360px,calc(100vw - 40px));padding:13px;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:var(--r-md);background:var(--surface-solid);box-shadow:var(--shadow-lg)}
.profile-modal{position:fixed;inset:0;z-index:90;display:grid;place-items:center;padding:20px;background:rgba(5,10,20,.55);backdrop-filter:blur(12px)}
.profile-modal-card{width:min(480px,100%);border:1px solid var(--line);border-radius:16px;background:var(--surface-solid);box-shadow:var(--shadow-lg);overflow:hidden}
.profile-modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.profile-modal-head strong{font-size:15px}.profile-modal-body{display:grid;gap:12px;padding:16px}.profile-modal-body label{display:grid;gap:7px;color:var(--ink-2);font-size:12px;font-weight:850;text-transform:uppercase;letter-spacing:.05em}.profile-modal-body textarea{min-height:96px;resize:vertical;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--surface-soft);color:var(--ink);font:inherit;font-size:14px;line-height:1.45;outline:none}.profile-toggle{display:flex!important;grid-template-columns:none!important;align-items:center;justify-content:space-between;gap:14px;text-transform:none!important;letter-spacing:0!important;color:var(--ink)!important}.profile-toggle span{font-size:13px;color:var(--ink-2);font-weight:650}.profile-modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:0 16px 16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}.posts{grid-template-columns:1fr}.hero-row{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:repeat(2,1fr)}h1{font-size:31px}.avatar{width:108px;height:108px;border-radius:24px}.topbar-inner,.shell{width:min(100% - 24px,720px)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="community.html" aria-label="Voltar para comunidade"><img src="assets/images/logo.JPG" alt="Forca Aliada"><span>Forca Aliada<small>Perfil publico</small></span></a>
    <nav class="actions" aria-label="Atalhos"><a class="btn secondary" href="community.html">Comunidade</a><a class="btn secondary" href="account.html">Conta</a></nav>
  </div>
</header>
<main class="shell" id="app"><section class="empty">Carregando perfil...</section></main>
<script>
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:3000' : 'https://forca-aliada-site.onrender.com';
const token = localStorage.getItem('fa_token');
if (!token) location.replace('login.html');
const $ = s => document.querySelector(s);
const profileState = { data: null, me: null };
function escapeHTML(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function skinUrl(n,s=100){return `https://minotar.net/helm/${encodeURIComponent((n||'Steve').trim()||'Steve')}/${s}.png`;}
function formatNumber(v){return Number(v||0).toLocaleString('pt-BR');}
function formatTime(v){const d=new Date(v);if(Number.isNaN(d))return '';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});}
function rankInfo(rank,merit=0){const id=String(rank||'').toLowerCase();if(id.includes('owner')||id.includes('full')||id.includes('admin'))return{label:'Staff',color:'#1761f0',cls:'staff'};if(id.includes('netherite')||merit>=900)return{label:'Netherite',color:'#7c3aed',cls:'netherite'};if(id.includes('diamante')||merit>=450)return{label:'Diamante',color:'#0e9384',cls:'diamante'};if(id.includes('ouro')||merit>=150)return{label:'Ouro',color:'#b7791f',cls:'ouro'};return{label:'Ferro',color:'#667085',cls:'ferro'};}
function mentionHTML(text){return escapeHTML(text||'').replace(/(^|[\s([{])@([a-z0-9_]{3,32})/gi,'$1<span style="color:var(--accent);font-weight:850">@$2</span>');}
async function api(path, options={}){const h=new Headers(options.headers||{});h.set('Authorization',`Bearer ${token}`);if(options.body&&!h.has('Content-Type'))h.set('Content-Type','application/json');const r=await fetch(`${API_BASE}${path}`,{...options,headers:h});const txt=await r.text();const data=txt?JSON.parse(txt):{};if(!r.ok)throw new Error(data.error||'Erro na API');return data;}
function identifier(){const path=decodeURIComponent(location.pathname);if(path.includes('/profile/'))return path.split('/profile/')[1].split('/')[0];return new URLSearchParams(location.search).get('id')||new URLSearchParams(location.search).get('name')||'me';}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3600);}
async function toggleFollow(id, btn){const following=btn.dataset.following==='1';btn.disabled=true;btn.textContent=following?'Seguir':'Seguindo';btn.dataset.following=following?'0':'1';try{await api(`/api/me/follows/${encodeURIComponent(id)}`,{method:following?'DELETE':'POST'});}catch(e){toast(e.message);btn.textContent=following?'Seguindo':'Seguir';btn.dataset.following=following?'1':'0';}finally{btn.disabled=false;}}
async function blockUser(id, unblock){try{await api(`/api/me/blocks/${encodeURIComponent(id)}`,{method:unblock?'DELETE':'POST'});toast(unblock?'Usuario desbloqueado.':'Usuario bloqueado.');if(!unblock)location.replace('community.html');else location.reload();}catch(e){toast(e.message);}}
async function reportUser(id){try{await api('/api/community/report',{method:'POST',body:JSON.stringify({content_type:'user',content_id:Number(id),reason:'other'})});toast('Denuncia enviada.');}catch(e){toast(e.message);}}
function render(data){profileState.data=data;const p=data.profile||{};const posts=data.posts||[];const stats=data.game_stats;const badges=data.badges||[];const name=p.minecraft_name||p.username||'Steve';const rank=rankInfo(p.rank||p.role,p.merit);document.title=`${name} | Forca Aliada`;const bars=stats?.daily_hours?.length?stats.daily_hours.map(d=>`<i style="height:${Math.max(8,Math.min(54,Number(d.hours||0)*12))}px"></i>`).join(''):Array.from({length:7},()=>'<i style="height:8px"></i>').join('');$('#app').innerHTML=`
<section class="hero">
  <div class="cover ${rank.cls}"></div>
  <div class="hero-body">
    <div class="hero-row">
      <img class="avatar" src="${skinUrl(name,140)}" alt="Avatar de ${escapeHTML(name)}" onerror="this.src='${skinUrl('Steve',140)}'">
      <div class="actions">${p.id===data.viewer_id?'<button class="btn primary" data-edit-profile>Editar perfil</button><a class="btn secondary" href="account.html">Conta</a>':`<button class="btn primary" data-follow="${p.id}" data-following="${p.is_following?'1':'0'}">${p.is_blocked_by_me?'Bloqueado':p.is_friend?'Amigo':p.is_following?'Seguindo':'Seguir'}</button><button class="btn secondary" data-message="${p.id}" data-name="${escapeHTML(name)}">Mensagem</button><button class="btn secondary" data-report="${p.id}">Denunciar</button><button class="btn danger" data-block="${p.id}" data-unblock="${p.is_blocked_by_me?'1':'0'}">${p.is_blocked_by_me?'Desbloquear':'Bloquear'}</button>`}</div>
    </div>
    <h1>${escapeHTML(name)}</h1>
    <span class="rank-pill" style="--rank:${rank.color}">${escapeHTML(rank.label)}</span>
    <p class="handle">@${escapeHTML(p.username||name)} · membro desde ${escapeHTML(formatTime(p.created_at))}</p>
    <p class="bio">${escapeHTML(p.bio||'Sem bio publica por enquanto.')}</p>
    <div class="stats"><div class="stat"><strong>${formatNumber(p.posts_count)}</strong><span>Posts</span></div><div class="stat"><strong>${formatNumber(p.followers_count)}</strong><span>Seguidores</span></div><div class="stat"><strong>${formatNumber(p.following_count)}</strong><span>Seguindo</span></div><div class="stat"><strong>${formatNumber(p.friends_count)}</strong><span>Amigos</span></div><div class="stat"><strong>${formatNumber(p.merit)}</strong><span>Merito</span></div></div>
  </div>
</section>
<section class="grid">
  <aside class="stack"><div class="card"><span>Horas no servidor</span><strong>${stats?formatNumber(Number(stats.total_hours||0).toFixed(1)):'Privado'}</strong><div class="bars">${bars}</div></div><div class="card"><span>Rank atual</span><strong style="color:${rank.color}">${escapeHTML(rank.label)}</strong><p class="copy">${escapeHTML((p.rank_benefits||[]).join(' · '))}</p></div><div class="card"><span>Capital</span><strong>${formatNumber(p.capital)}</strong></div></aside>
  <section><p class="section-title">Posts recentes</p><div class="posts">${posts.length?posts.map(post=>`<article class="post" data-post="${post.id}"><p>${mentionHTML(post.content)}</p><small>${formatTime(post.created_at)} · ${formatNumber(post.likes_count)} likes · ${formatNumber(post.comments_count)} respostas</small></article>`).join(''):'<div class="empty">Nenhum post publico ainda.</div>'}</div></section>
  <aside><p class="section-title">Conquistas</p><div class="stack">${badges.map(b=>`<div class="badge" title="${escapeHTML(b.description)}"><strong>${escapeHTML(b.label)}</strong><span>${escapeHTML(b.description)} · ${formatNumber(b.progress)}%</span></div>`).join('')}</div></aside>
</section>`;}
async function openProfileEditor(){const prefs=await api('/api/me/preferences');const p=profileState.data?.profile||{};const modal=document.createElement('div');modal.className='profile-modal';modal.innerHTML=`<div class="profile-modal-card" role="dialog" aria-modal="true" aria-label="Editar perfil"><div class="profile-modal-head"><strong>Editar perfil publico</strong><button class="btn secondary" data-close-edit>Fechar</button></div><div class="profile-modal-body"><label>Descricao<textarea id="edit-bio" maxlength="160" placeholder="Conte um pouco sobre voce na comunidade.">${escapeHTML(prefs.bio??p.bio??'')}</textarea></label><label class="profile-toggle"><div><strong>Perfil publico</strong><span>Permite que jogadores encontrem seu perfil.</span></div><input type="checkbox" id="edit-public-profile" ${prefs.public_profile?'checked':''}></label><label class="profile-toggle"><div><strong>Historico publico</strong><span>Mostra horas e atividade recente do servidor.</span></div><input type="checkbox" id="edit-public-history" ${prefs.public_history?'checked':''}></label></div><div class="profile-modal-foot"><button class="btn secondary" data-close-edit>Cancelar</button><button class="btn primary" data-save-profile>Salvar</button></div></div>`;document.body.appendChild(modal);modal.querySelector('#edit-bio').focus();}
async function saveProfileEditor(btn){const modal=btn.closest('.profile-modal');const bio=modal.querySelector('#edit-bio').value.trim();const publicProfile=modal.querySelector('#edit-public-profile').checked;const publicHistory=modal.querySelector('#edit-public-history').checked;btn.disabled=true;try{const current=await api('/api/me/preferences');const saved=await api('/api/me/preferences',{method:'PUT',body:JSON.stringify({...current,bio,public_profile:publicProfile,public_history:publicHistory})});const p=profileState.data.profile;p.bio=saved.bio;p.public_profile=saved.public_profile;p.public_history=saved.public_history;modal.remove();render(profileState.data);toast('Perfil atualizado.');}catch(e){toast(e.message);btn.disabled=false;}}
document.addEventListener('click',e=>{const post=e.target.closest('[data-post]');if(post)location.href=`post.html?id=${encodeURIComponent(post.dataset.post)}`;const f=e.target.closest('[data-follow]');if(f)toggleFollow(f.dataset.follow,f);const b=e.target.closest('[data-block]');if(b)blockUser(b.dataset.block,b.dataset.unblock==='1');const r=e.target.closest('[data-report]');if(r)reportUser(r.dataset.report);const m=e.target.closest('[data-message]');if(m)window.FAChat?.openWithUser({id:m.dataset.message,minecraft_name:m.dataset.name});if(e.target.closest('[data-edit-profile]'))openProfileEditor();if(e.target.closest('[data-close-edit]'))e.target.closest('.profile-modal')?.remove();const s=e.target.closest('[data-save-profile]');if(s)saveProfileEditor(s);});
(async()=>{try{const me=await api('/api/me');profileState.me=me;const data=await api(`/api/community/player/${encodeURIComponent(identifier()==='me'?(me.minecraft_name||`id:${me.id}`):identifier())}/full-profile`);data.viewer_id=me.id;render(data);}catch(e){$('#app').innerHTML=`<section class="empty"><h1>Perfil indisponivel</h1><p>${escapeHTML(e.message)}</p><a class="btn primary" href="community.html">Voltar</a></section>`;}})();
</script>
<script src="assets/js/social-chat.js" defer></script>
</body>
</html>

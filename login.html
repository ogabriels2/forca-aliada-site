<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | Força Aliada</title><style>body{font-family:Arial,sans-serif;background:#0b1020;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{width:min(420px,92%);background:#111a33;padding:24px;border-radius:16px}input{width:100%;margin:8px 0;padding:12px;border-radius:10px;border:1px solid #334}button{width:100%;padding:12px;border:none;background:#2563eb;color:#fff;border-radius:10px;font-weight:700}.link{color:#93c5fd;cursor:pointer}</style><script src="web/auth.js"></script></head><body><div class="card"><h2>Entrar / Criar conta</h2><input id="id" placeholder="Usuário ou e-mail"><input id="pw" type="password" placeholder="Senha"><button onclick="doLogin()">Entrar</button><hr><input id="new-user" placeholder="Novo usuário"><input id="new-email" placeholder="E-mail"><input id="new-pass" type="password" placeholder="Nova senha"><button onclick="doRegister()">Criar conta</button><p id="msg"></p></div><script>seedUsers();function nextPage(){const p=new URLSearchParams(location.search).get('next');return p||'index.html'}function doLogin(){const r=login(document.getElementById('id').value,document.getElementById('pw').value);document.getElementById('msg').innerText=r.ok?'Login OK, redirecionando...':r.message;if(r.ok)location.href=nextPage()}function doRegister(){const r=register({username:document.getElementById('new-user').value.trim(),email:document.getElementById('new-email').value.trim(),password:document.getElementById('new-pass').value.trim()});document.getElementById('msg').innerText=r.ok?'Conta criada! Faça login.':r.message}document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});</script></body></html>

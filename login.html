<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Força Aliada</title>

<script>
(function(){
  const key='fa_theme';
  const token=localStorage.getItem('fa_token');
  function effective(t){return t==='dark'||(t==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}
  function apply(t){document.documentElement.setAttribute('data-theme', effective(t||localStorage.getItem(key)||'auto'));}
  apply();
  if(token){const syncTheme=()=>{fetch('https://forca-aliada-site.onrender.com/api/me/preferences',{headers:{Authorization:'Bearer '+token}}).then(r=>r.ok?r.json():null).then(p=>{if(p&&p.theme){localStorage.setItem(key,p.theme);apply(p.theme);}}).catch(()=>{});};(typeof requestIdleCallback==='function')?requestIdleCallback(syncTheme,{timeout:3000}):setTimeout(syncTheme,800);}
  matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change',()=>apply(localStorage.getItem(key)||'auto'));
})();
</script>

<style>
/* ── Reset & Base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:            #f0f2f8;
  --card-bg:       rgba(255,255,255,0.92);
  --text-primary:  #111827;
  --text-secondary:#6b7280;
  --text-muted:    #9ca3af;
  --accent:        #0071e3;
  --accent-hover:  #005bbf;
  --accent-light:  rgba(0,113,227,0.10);
  --danger:        #dc2626;
  --danger-bg:     rgba(220,38,38,0.08);
  --success:       #16a34a;
  --success-bg:    rgba(22,163,74,0.08);
  --border:        #e5e7eb;
  --border-focus:  #0071e3;
  --input-bg:      #ffffff;
  --radius-card:   20px;
  --radius-input:  10px;
  --radius-btn:    980px;
  --shadow-card:   0 4px 6px -1px rgba(0,0,0,0.07), 0 20px 40px -8px rgba(0,0,0,0.10);
  --font:          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  --transition:    0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  color-scheme: dark;
  --bg:            #080d14;
  --card-bg:       rgba(17,24,39,0.90);
  --text-primary:  #f8fafc;
  --text-secondary:#94a3b8;
  --text-muted:    #64748b;
  --accent:        #60a5fa;
  --accent-hover:  #93c5fd;
  --accent-light:  rgba(96,165,250,0.14);
  --danger:        #f87171;
  --danger-bg:     rgba(248,113,113,0.10);
  --success:       #4ade80;
  --success-bg:    rgba(74,222,128,0.10);
  --border:        rgba(148,163,184,0.18);
  --border-focus:  #60a5fa;
  --input-bg:      rgba(15,23,42,0.80);
  --shadow-card:   0 4px 6px -1px rgba(0,0,0,0.3), 0 20px 60px -8px rgba(0,0,0,0.5);
}

html { font-size: 16px; }
body {
  font-family: var(--font);
  background-color: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background-color 0.3s, color 0.3s;
}
[data-theme="dark"] body {
  background:
    radial-gradient(ellipse at 20% 0%, rgba(96,165,250,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 0%, rgba(139,92,246,0.08) 0%, transparent 50%),
    #080d14;
}
a { text-decoration: none; color: inherit; }

/* ── Header ──────────────────────────────────── */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  z-index: 100;
}
[data-theme="dark"] header {
  background: rgba(8,13,20,0.82);
  border-color: rgba(255,255,255,0.06);
}
.brand-link {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 17px; letter-spacing: -0.02em;
  transition: opacity var(--transition);
}
.brand-link:hover { opacity: 0.75; }
.logo-img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
.nav-link {
  font-size: 14px; font-weight: 500; color: var(--accent);
  padding: 7px 14px; border-radius: 8px;
  background: var(--accent-light);
  transition: background var(--transition);
}
.nav-link:hover { background: rgba(0,113,227,0.16); }
[data-theme="dark"] .nav-link:hover { background: rgba(96,165,250,0.20); }

/* ── Layout ──────────────────────────────────── */
.page-wrapper {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 80px 20px 40px; min-height: 100vh;
}

/* ── Card ─────────────────────────────────────── */
.card {
  width: 100%; max-width: 400px;
  background: var(--card-bg);
  border-radius: var(--radius-card);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  padding: 36px;
  animation: cardIn 0.35s cubic-bezier(0.34, 1.3, 0.64, 1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@media (max-width: 480px) {
  .card { padding: 28px 20px 24px; border-radius: 16px; }
}

/* ── Avatar ───────────────────────────────────── */
.avatar-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
.avatar-img {
  width: 72px; height: 72px; border-radius: 18px; object-fit: cover;
  background: var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  transition: opacity 0.3s, transform 0.3s;
}
.avatar-img.loading { opacity: 0.5; transform: scale(0.95); }

/* ── Card Header ──────────────────────────────── */
.card-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; text-align: center; margin-bottom: 4px; }
.card-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 28px; line-height: 1.5; }

/* ── Field ────────────────────────────────────── */
.field { margin-bottom: 14px; position: relative; }
.field label {
  display: block; font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
  color: var(--text-secondary); margin-bottom: 6px;
  transition: color var(--transition);
}
.field.has-error label { color: var(--danger); }

.input-wrap { position: relative; display: flex; align-items: center; }
.input-wrap input {
  width: 100%; padding: 12px 42px 12px 14px;
  font-family: var(--font); font-size: 15px;
  color: var(--text-primary); background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-input); outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  line-height: 1.4;
}
.input-wrap input::placeholder { color: var(--text-muted); }
.input-wrap input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.field.has-error .input-wrap input {
  border-color: var(--danger) !important;
  box-shadow: 0 0 0 3px var(--danger-bg) !important;
}

/* Botão de olho */
.toggle-pass {
  position: absolute; right: 13px;
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 0;
  display: flex; align-items: center;
  transition: color var(--transition); z-index: 1;
}
.toggle-pass:hover { color: var(--text-secondary); }

/* ── Field hint / error ───────────────────────── */
.field-hint {
  font-size: 12px; margin-top: 5px; line-height: 1.5;
  color: var(--danger); display: none;
}
.field-hint.visible { display: block; }

/* ── Esqueci a senha ──────────────────────────── */
.forgot-link {
  display: block; text-align: right;
  font-size: 12.5px; font-weight: 500;
  color: var(--text-muted);
  margin-top: -8px; margin-bottom: 18px;
  transition: color var(--transition);
}
.forgot-link:hover { color: var(--accent); }

/* ── Submit Button ────────────────────────────── */
.btn-submit {
  width: 100%; padding: 14px; margin-top: 4px;
  font-family: var(--font); font-size: 15px; font-weight: 600;
  color: #fff; background: var(--accent);
  border: none; border-radius: var(--radius-btn);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition), opacity var(--transition);
}
.btn-submit:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(0,113,227,0.30);
}
.btn-submit:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
.btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }
[data-theme="dark"] .btn-submit {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  box-shadow: 0 4px 14px rgba(37,99,235,0.25);
}
[data-theme="dark"] .btn-submit:hover:not(:disabled) {
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  box-shadow: 0 8px 24px rgba(37,99,235,0.35);
}

/* Spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Alert global ─────────────────────────────── */
.alert {
  border-radius: 10px; padding: 12px 14px;
  font-size: 13.5px; font-weight: 500; line-height: 1.5;
  margin-top: 14px; display: none;
}
.alert.visible { display: block; }
.alert-error   { background: var(--danger-bg); color: var(--danger);  border: 1px solid rgba(220,38,38,0.18); }
.alert-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(22,163,74,0.18); }
.alert-info    { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(0,113,227,0.18); }

/* ── Divisor ──────────────────────────────────── */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--text-muted); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── Footer ───────────────────────────────────── */
.card-footer {
  margin-top: 22px; text-align: center;
  font-size: 13.5px; color: var(--text-secondary);
}
.card-footer a { color: var(--text-primary); font-weight: 600; transition: color var(--transition); }
.card-footer a:hover { color: var(--accent); }

/* ── Logged-in view ───────────────────────────── */
#view-loggedin { display: none; text-align: center; }
.loggedin-avatar {
  width: 80px; height: 80px; border-radius: 20px; object-fit: cover;
  margin: 0 auto 16px; display: block;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.loggedin-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.loggedin-sub  { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }

/* ── Shake ────────────────────────────────────── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  16%,50%  { transform: translateX(-6px); }
  33%,66%  { transform: translateX(6px); }
}
.shake { animation: shake 0.38s ease; }

/* ── Attempts warning ─────────────────────────── */
.attempts-bar {
  height: 2px; border-radius: 1px;
  background: var(--border); margin-top: 8px; overflow: hidden;
  display: none;
}
.attempts-bar.visible { display: block; }
.attempts-fill {
  height: 100%; border-radius: 1px;
  background: var(--danger);
  transition: width 0.3s ease;
}
</style>

<body>

<header>
  <a href="index.html" class="brand-link">
    <img src="assets/images/logo.JPG"
         onerror="this.src='https://minotar.net/helm/Steve/100.png'"
         alt="FA Logo" class="logo-img" width="32" height="32">
    <span>Força Aliada</span>
  </a>
  <a href="signup.html" class="nav-link">Criar conta</a>
</header>

<div class="page-wrapper">
  <div class="card" id="mainCard">

    <!-- ── View: Já autenticado ─────────────────── -->
    <div id="view-loggedin">
      <img id="avatar-loggedin" class="loggedin-avatar"
           src="assets/images/logo.JPG"
           onerror="this.src='https://minotar.net/helm/Steve/100.png'" alt="Avatar">
      <div id="loggedin-username" class="loggedin-name"></div>
      <div class="loggedin-sub">Você já está conectado.</div>
      <button class="btn-submit" onclick="location.href='dashboard.html'">Acessar o Painel</button>
      <div class="card-footer" style="margin-top:16px;">
        <a onclick="forceLogout()" style="color:var(--danger);cursor:pointer;">Entrar com outra conta</a>
      </div>
    </div>

    <!-- ── View: Login ──────────────────────────── -->
    <div id="view-login">
      <div class="avatar-wrap">
        <img id="avatar-login" class="avatar-img"
             src="assets/images/logo.JPG"
             onerror="this.src='https://minotar.net/helm/Steve/100.png'" alt="Logotipo">
      </div>

      <h1 class="card-title">Entrar</h1>
      <p class="card-subtitle">Acesse o painel administrativo da Força Aliada.</p>

      <form id="login-form" autocomplete="on" novalidate>

        <!-- Usuário ou e-mail -->
        <div class="field" id="field-login">
          <label for="login-input">Usuário ou e-mail</label>
          <div class="input-wrap">
            <input id="login-input" name="username" type="text"
                   placeholder="nome_de_usuario ou email@..."
                   autocomplete="username"
                   autocapitalize="none" autocorrect="off" spellcheck="false"
                   aria-describedby="hint-login" required>
          </div>
          <div class="field-hint" id="hint-login"></div>
        </div>

        <!-- Senha -->
        <div class="field" id="field-password" style="margin-bottom:8px;">
          <label for="pass-input">Senha</label>
          <div class="input-wrap">
            <input id="pass-input" name="password" type="password"
                   placeholder="Sua senha"
                   autocomplete="current-password"
                   aria-describedby="hint-password" required>
            <button type="button" class="toggle-pass" id="toggle-pw"
                    aria-label="Mostrar/ocultar senha" tabindex="-1">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-hint" id="hint-password"></div>
        </div>

        <!-- Esqueci a senha -->
        <a href="recuperar.html" class="forgot-link">Esqueci minha senha</a>

        <!-- Alerta global -->
        <div class="alert" id="login-alert" role="alert" aria-live="assertive"></div>

        <!-- Barra de tentativas -->
        <div class="attempts-bar" id="attempts-bar">
          <div class="attempts-fill" id="attempts-fill" style="width:0%"></div>
        </div>

        <button type="submit" id="btn-login" class="btn-submit">
          <div class="spinner" id="spinner-login"></div>
          <span id="btn-login-text">Iniciar Sessão</span>
        </button>
      </form>

      <div class="card-footer">
        Não possui acesso? <a href="signup.html">Criar conta</a>
      </div>
    </div><!-- /view-login -->

  </div><!-- /card -->
</div><!-- /page-wrapper -->

<script>
'use strict';
const API_BASE    = 'https://forca-aliada-site.onrender.com';
const SESSION_KEY = 'fa_session';
const TOKEN_KEY   = 'fa_token';

let failedAttempts = 0;
const MAX_ATTEMPTS = 5;

// ── Show/hide views ───────────────────────────────
function showView(name) {
  document.getElementById('view-loggedin').style.display = name === 'loggedin' ? '' : 'none';
  document.getElementById('view-login').style.display    = name === 'login'    ? '' : 'none';
}

// ── Alert helpers ─────────────────────────────────
function showAlert(text, type, isHtml = false) {
  const el = document.getElementById('login-alert');
  el.className = 'alert visible alert-' + type;
  if (isHtml) el.innerHTML = text;
  else el.textContent = text;
}
function clearAlert() {
  const el = document.getElementById('login-alert');
  el.className = 'alert'; el.textContent = '';
}

function setFieldError(fieldId, hintText) {
  const field = document.getElementById('field-' + fieldId);
  const hint  = document.getElementById('hint-'  + fieldId);
  field.classList.add('has-error');
  hint.textContent = hintText;
  hint.classList.add('visible');
}
function clearFieldError(fieldId) {
  const field = document.getElementById('field-' + fieldId);
  const hint  = document.getElementById('hint-'  + fieldId);
  field.classList.remove('has-error');
  hint.textContent = '';
  hint.classList.remove('visible');
}

// ── Shake card ─────────────────────────────────────
function shakeCard() {
  const c = document.getElementById('mainCard');
  c.classList.remove('shake');
  void c.offsetWidth;
  c.classList.add('shake');
}

// ── Attempts visual feedback ──────────────────────
function updateAttemptsBar(attempts) {
  const bar  = document.getElementById('attempts-bar');
  const fill = document.getElementById('attempts-fill');
  if (attempts === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  fill.style.width = Math.min((attempts / MAX_ATTEMPTS) * 100, 100) + '%';
}

// ── Toggle senha ───────────────────────────────────
document.getElementById('toggle-pw').addEventListener('click', () => {
  const input  = document.getElementById('pass-input');
  const isPass = input.type === 'password';
  input.type   = isPass ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = isPass
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
});

// ── Clear erros ao digitar ─────────────────────────
document.getElementById('login-input').addEventListener('input', () => {
  clearFieldError('login');
  clearAlert();
});
document.getElementById('pass-input').addEventListener('input', () => {
  clearFieldError('password');
  clearAlert();
});

// ── Traduções de erros do servidor ────────────────
const SERVER_ERRORS = {
  'invalid credentials':    'Usuário ou senha incorretos. Verifique e tente novamente.',
  'invalid_credentials':    'Usuário ou senha incorretos. Verifique e tente novamente.',
  'user not found':         'Nenhuma conta encontrada com este usuário ou e-mail.',
  'wrong password':         'Senha incorreta. Esqueceu a senha? Use o link abaixo.',
  'unverified_email':       'E-mail ainda não verificado.',
  'account disabled':       'Esta conta foi desativada. Entre em contato com um admin.',
  'account suspended':      'Esta conta está suspensa. Entre em contato com um admin.',
  'too many attempts':      'Muitas tentativas. Aguarde alguns minutos antes de tentar novamente.',
  'rate limit':             'Muitas tentativas. Aguarde alguns minutos.',
  'server error':           'Erro interno no servidor. Tente novamente em instantes.',
};

function translateError(err, status) {
  if (SERVER_ERRORS[err]) return SERVER_ERRORS[err];
  if (status === 401) return 'Usuário ou senha incorretos.';
  if (status === 429) return 'Muitas tentativas seguidas. Aguarde alguns minutos.';
  if (status >= 500)  return 'Erro no servidor. Tente novamente em instantes.';
  return err || 'Falha no login. Verifique suas credenciais.';
}

// ── Handle login ───────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAlert();
  clearFieldError('login');
  clearFieldError('password');

  const loginVal = document.getElementById('login-input').value.trim();
  const passVal  = document.getElementById('pass-input').value;
  const btn      = document.getElementById('btn-login');
  const spinner  = document.getElementById('spinner-login');
  const btnText  = document.getElementById('btn-login-text');

  // ── Validação client-side ─────────────────────
  let hasError = false;
  if (!loginVal) {
    setFieldError('login', 'Informe seu nome de usuário ou e-mail.');
    hasError = true;
  }
  if (!passVal) {
    setFieldError('password', 'Informe sua senha.');
    hasError = true;
  }
  if (hasError) { shakeCard(); return; }

  // ── Envia ─────────────────────────────────────
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent   = 'Aguarde…';

  const slowTimer = setTimeout(() => {
    showAlert('O servidor está acordando — pode levar até 30 segundos na primeira vez…', 'info');
  }, 4000);

  try {
    const res  = await fetch(`${API_BASE}/api/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ login: loginVal, password: passVal }),
    });
    clearTimeout(slowTimer);
    clearAlert();

    const data = await res.json();

    // Conta não verificada → redireciona para verificação
    if (res.status === 403 && data.error === 'unverified_email') {
      showAlert('Sua conta ainda não foi verificada. Redirecionando…', 'info');
      setTimeout(() => {
        location.href = `signup.html?verify=${encodeURIComponent(data.email || loginVal)}`;
      }, 1400);
      return;
    }

    if (!res.ok) {
      failedAttempts++;
      updateAttemptsBar(failedAttempts);

      const msg = translateError(data.error, res.status);

      // Dicas contextuais após erros repetidos
      if (failedAttempts >= 2 && failedAttempts < MAX_ATTEMPTS) {
        const remaining = MAX_ATTEMPTS - failedAttempts;
        showAlert(
          msg + `<br><small style="opacity:.8;display:block;margin-top:6px;">` +
          (failedAttempts >= 3
            ? `<a href="recuperar.html" style="color:inherit;text-decoration:underline;font-weight:600;">Recuperar senha →</a>`
            : `Tentativa ${failedAttempts}. Verifique Caps Lock e tente novamente.`) +
          `</small>`,
          'error', true
        );
      } else if (failedAttempts >= MAX_ATTEMPTS) {
        showAlert(
          'Muitas tentativas incorretas. ' +
          '<a href="recuperar.html" style="color:inherit;text-decoration:underline;font-weight:600;">Recuperar sua senha →</a>',
          'error', true
        );
        btn.disabled = true;
        spinner.style.display = 'none';
        btnText.textContent = 'Iniciar Sessão';
        shakeCard();
        return;
      } else {
        showAlert(msg, 'error');
      }

      // Destaca o campo de senha em caso de credencial errada
      if (res.status === 401) {
        document.getElementById('pass-input').value = '';
        document.getElementById('pass-input').focus();
      }

      shakeCard();
      throw new Error('handled');
    }

    // ── Sucesso ────────────────────────────────
    failedAttempts = 0;
    updateAttemptsBar(0);

    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(SESSION_KEY, JSON.stringify(data.user));

    showAlert('Autenticado! Redirecionando…', 'success');
    btnText.textContent = 'Entrando…';

    setTimeout(() => { location.href = 'dashboard.html'; }, 550);

  } catch (err) {
    if (err.message !== 'handled') {
      clearTimeout(slowTimer);
      clearAlert();
      showAlert('Falha na conexão. Verifique sua internet e tente novamente.', 'error');
      shakeCard();
    }
    if (!document.getElementById('btn-login').style.pointerEvents) {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent   = 'Iniciar Sessão';
    }
  }
});

// ── Logout ────────────────────────────────────────
function forceLogout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(SESSION_KEY);
  showView('login');
}

// ── Auto-verificação de sessão ─────────────────────
(async () => {
  const token = localStorage.getItem(TOKEN_KEY);

  if (!token) { showView('login'); return; }

  try {
    const res = await fetch(`${API_BASE}/api/me`, {
      headers: { Authorization: `Bearer ${token}` },
    });

    if (!res.ok) throw new Error('Sessão expirada');

    const me = await res.json();
    const sessionData = {
      username:      me.username,
      email:         me.email,
      minecraftName: me.minecraft_name,
      role:          me.role,
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));

    // Skin do jogador
    const skinUrl = me.minecraft_name
      ? `https://minotar.net/helm/${encodeURIComponent(me.minecraft_name)}/100.png`
      : 'assets/images/logo.JPG';

    const img = document.getElementById('avatar-loggedin');
    img.src = skinUrl;
    img.onerror = () => { img.src = 'assets/images/logo.JPG'; };
    document.getElementById('loggedin-username').textContent = me.username;

    // Atualiza header
    const headerRight = document.getElementById('header-right');
    if (headerRight) headerRight.style.display = 'none';

    showView('loggedin');

  } catch {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(SESSION_KEY);
    showView('login');
  }
})();
</script>

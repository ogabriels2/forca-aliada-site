<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Força Aliada</title>
<script>
// [2.2] Redirect post.html → community.html preserving post ID
(function () {
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  if (id) {
    var dest = new URL('community.html', location.href);
    dest.searchParams.set('post', id);
    location.replace(dest.toString());
  } else {
    location.replace('community.html');
  }
})();
</script>
</head>
<body></body>
</html>

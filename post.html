<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post | Forca Aliada</title>
<meta name="description" content="Thread de post da comunidade Forca Aliada.">
<link rel="preconnect" href="https://forca-aliada-site.onrender.com" crossorigin>
<link rel="preconnect" href="https://minotar.net" crossorigin>
<script>
(function(){const t=localStorage.getItem('fa_theme')||'light';const d=t==='dark'||(t==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');})();
</script>
<style>
:root{color-scheme:light;--bg:#f3f6fb;--bg-2:#eaf0f8;--surface:rgba(255,255,255,.86);--surface-solid:#fff;--surface-soft:#f8fafc;--ink:#101828;--ink-2:#475467;--ink-3:#98a2b3;--line:rgba(16,24,40,.10);--line-strong:rgba(16,24,40,.16);--accent:#1761f0;--accent-2:#0e9384;--accent-soft:rgba(23,97,240,.10);--danger:#d92d20;--danger-soft:rgba(217,45,32,.10);--success:#148f54;--warning:#dc7f00;--gold:#b7791f;--purple:#7c3aed;--r-sm:10px;--r-md:14px;--r-lg:20px;--shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 0 rgba(255,255,255,.72) inset;--shadow-md:0 10px 28px rgba(16,24,40,.09),0 1px 0 rgba(255,255,255,.82) inset;--shadow-lg:0 24px 70px rgba(16,24,40,.16);--ease:cubic-bezier(.16,1,.3,1);--t-fast:.14s;--t-med:.24s}
[data-theme=dark]{color-scheme:dark;--bg:#090d14;--bg-2:#101826;--surface:rgba(18,25,38,.84);--surface-solid:#121926;--surface-soft:#172033;--ink:#f4f7fb;--ink-2:#c4cedb;--ink-3:#8b98aa;--line:rgba(255,255,255,.11);--line-strong:rgba(255,255,255,.18);--accent:#6ea8ff;--accent-2:#46c3b2;--accent-soft:rgba(110,168,255,.14);--danger:#ff6b60;--danger-soft:rgba(255,107,96,.14);--success:#47c982;--warning:#ffb454;--gold:#f6c66b;--purple:#b692ff;--shadow-sm:0 1px 2px rgba(0,0,0,.28);--shadow-md:0 14px 34px rgba(0,0,0,.34);--shadow-lg:0 28px 80px rgba(0,0,0,.46)}
*{box-sizing:border-box}html{min-height:100%;scroll-behavior:smooth}body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,var(--bg-2) 0%,var(--bg) 310px,var(--bg));color:var(--ink);-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}button,textarea{font:inherit}button{border:0}:where(a,button,textarea):focus-visible{outline:3px solid color-mix(in srgb,var(--accent) 48%,transparent);outline-offset:3px}
.topbar{position:sticky;top:0;z-index:10;height:68px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--surface-solid) 78%,transparent);backdrop-filter:blur(22px) saturate(170%)}.topbar-inner{width:min(880px,calc(100% - 32px));height:100%;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px;font-weight:900}.brand img{width:38px;height:38px;border-radius:10px}.brand span{display:grid}.brand small{color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.shell{width:min(880px,calc(100% - 32px));margin:24px auto 70px;display:grid;gap:14px}.btn{min-height:38px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 15px;border-radius:999px;font-size:13px;font-weight:850;cursor:pointer;transition:transform var(--t-fast) var(--ease),border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}.btn.primary{color:#fff;background:linear-gradient(135deg,var(--accent),#0d4fc7);box-shadow:0 12px 24px rgba(23,97,240,.26)}.btn.secondary{border:1px solid var(--line);background:var(--surface-solid);color:var(--ink-2)}.btn.danger{border:1px solid color-mix(in srgb,var(--danger) 34%,transparent);background:var(--danger-soft);color:var(--danger)}.btn:hover{transform:translateY(-1px)}
.crumb{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--ink-2);font-size:13px;font-weight:800}.card,.comment,.empty{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--shadow-md)}.card{padding:18px}.post-layout{display:grid;grid-template-columns:56px minmax(0,1fr);gap:13px}.avatar{width:56px;height:56px;border-radius:16px;object-fit:cover;background:var(--surface-soft);border:1px solid var(--line)}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.author{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.author strong{font-size:15px;font-weight:900}.meta{color:var(--ink-3);font-size:12px;font-weight:750}.rank{display:inline-flex;align-items:center;min-height:22px;padding:0 8px;border-radius:999px;color:var(--rank);background:color-mix(in srgb,var(--rank) 13%,transparent);border:1px solid color-mix(in srgb,var(--rank) 22%,transparent);font-size:11px;font-weight:900;text-transform:capitalize}.content{margin:10px 0 0;font-size:17px;line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere}.edited{color:var(--ink-3);font-size:12px;font-weight:750}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.composer{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;padding:14px;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--shadow-sm)}.composer textarea{width:100%;min-height:46px;max-height:150px;resize:none;outline:0;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-soft);color:var(--ink);line-height:1.45}.composer textarea:focus{border-color:color-mix(in srgb,var(--accent) 58%,var(--line));box-shadow:0 0 0 4px var(--accent-soft)}
.comments{display:grid;gap:10px}.comment{display:grid;grid-template-columns:42px minmax(0,1fr);gap:10px;padding:12px;border-radius:var(--r-md);box-shadow:var(--shadow-sm)}.comment img{width:42px;height:42px;border-radius:12px}.comment p{margin:6px 0 0;font-size:14px;line-height:1.5;white-space:pre-wrap;overflow-wrap:anywhere}.deleted{color:var(--ink-3);font-style:italic}.empty{padding:34px 22px;text-align:center;color:var(--ink-2)}.toast{position:fixed;right:20px;bottom:20px;z-index:40;width:min(360px,calc(100vw - 40px));padding:13px;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:var(--r-md);background:var(--surface-solid);box-shadow:var(--shadow-lg)}
@keyframes likeFlip{0%{transform:translateY(0);opacity:1}40%{transform:translateY(-100%);opacity:0}41%{transform:translateY(100%);opacity:0}100%{transform:translateY(0);opacity:1}}.flip{animation:likeFlip .32s var(--ease)}
@media(max-width:720px){.topbar-inner,.shell{width:min(100% - 24px,680px)}.post-layout{grid-template-columns:46px minmax(0,1fr)}.avatar{width:46px;height:46px;border-radius:13px}.head{display:grid}.content{font-size:16px}.composer{position:sticky;bottom:10px;z-index:4;grid-template-columns:1fr}.card{padding:14px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="community.html" aria-label="Voltar para comunidade"><img src="assets/images/logo.JPG" alt="Forca Aliada"><span>Forca Aliada<small>Thread</small></span></a>
    <a class="btn secondary" href="community.html">Comunidade</a>
  </div>
</header>
<main class="shell" id="app"><section class="empty">Carregando post...</section></main>
<script>
const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:3000':'https://forca-aliada-site.onrender.com';
const token=localStorage.getItem('fa_token');if(!token)location.replace('login.html');
const $=s=>document.querySelector(s);let state={post:null,comments:[],me:null};
function escapeHTML(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function mentionHTML(text){return escapeHTML(text||'').replace(/(^|[\s([{])@([a-z0-9_]{3,32})/gi,'$1<span style="color:var(--accent);font-weight:850">@$2</span>');}
function skinUrl(n,s=50){return`https://minotar.net/helm/${encodeURIComponent((n||'Steve').trim()||'Steve')}/${s}.png`;}
function formatNumber(v){return Number(v||0).toLocaleString('pt-BR');}
function rel(v){const d=new Date(v);const diff=Math.max(0,(Date.now()-d)/1000);if(diff<45)return'agora';if(diff<3600)return`${Math.floor(diff/60)}min`;if(diff<86400)return`${Math.floor(diff/3600)}h`;return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function rankInfo(rank,merit=0){const id=String(rank||'').toLowerCase();if(id.includes('owner')||id.includes('full')||id.includes('admin'))return{label:'Staff',color:'#1761f0'};if(id.includes('netherite')||merit>=900)return{label:'Netherite',color:'#7c3aed'};if(id.includes('diamante')||merit>=450)return{label:'Diamante',color:'#0e9384'};if(id.includes('ouro')||merit>=150)return{label:'Ouro',color:'#b7791f'};return{label:'Ferro',color:'#667085'};}
async function api(path,options={}){const h=new Headers(options.headers||{});h.set('Authorization',`Bearer ${token}`);if(options.body&&!h.has('Content-Type'))h.set('Content-Type','application/json');const r=await fetch(`${API_BASE}${path}`,{...options,headers:h});const txt=await r.text();const data=txt?JSON.parse(txt):{};if(!r.ok)throw new Error(data.error||'Erro na API');return data;}
function postId(){const p=decodeURIComponent(location.pathname);if(p.includes('/community/post/'))return p.split('/community/post/')[1].split('/')[0];return new URLSearchParams(location.search).get('id');}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3600);}
function postHTML(p){const name=p.minecraft_name||p.username||'Steve';const rank=rankInfo(p.rank||p.role,p.merit);const edited=p.updated_at&&new Date(p.updated_at)>new Date(p.created_at);const isMine=Number(p.author_id)===Number(state.me?.id);const canEdit=isMine&&((Date.now()-new Date(p.created_at))/60000)<=15;return`<section class="card"><div class="post-layout"><img class="avatar" src="${skinUrl(name,60)}" alt="Avatar de ${escapeHTML(name)}" onerror="this.src='${skinUrl('Steve',60)}'"><div><div class="head"><div><div class="author"><strong>${escapeHTML(name)}</strong><span class="meta">@${escapeHTML(p.username||name)}</span><span class="rank" style="--rank:${rank.color}">${escapeHTML(rank.label)}</span></div><span class="meta">${escapeHTML(rel(p.created_at))} ${edited?'<span class="edited">(editado)</span>':''}</span></div><button class="btn secondary" data-copy>Compartilhar</button></div><div class="content" id="post-content-view">${mentionHTML(p.content)}</div><div class="actions"><button class="btn secondary" data-like><span id="like-count">${formatNumber(p.likes_count)}</span> likes</button><button class="btn secondary" data-report>Denunciar</button>${canEdit?'<button class="btn secondary" data-edit>Editar</button>':''}</div></div></div></section>`;}
function commentsHTML(){if(!state.comments.length)return'<section class="empty">Nenhuma resposta ainda.</section>';return state.comments.map(c=>{const n=c.minecraft_name||c.username||'Steve';return`<article class="comment"><img src="${skinUrl(n,50)}" alt="Avatar de ${escapeHTML(n)}" onerror="this.src='${skinUrl('Steve',50)}'"><div><div class="author"><strong>${escapeHTML(n)}</strong><span class="meta">@${escapeHTML(c.username||n)} · ${escapeHTML(rel(c.created_at))}</span></div><p class="${c.is_deleted?'deleted':''}">${c.is_deleted?escapeHTML(c.content):mentionHTML(c.content)}</p></div></article>`}).join('');}
function render(){const p=state.post;document.title=`Post de ${p.minecraft_name||p.username||'jogador'} | Forca Aliada`;$('#app').innerHTML=`<div class="crumb"><span>Comunidade / @${escapeHTML(p.username||p.minecraft_name||'jogador')} / Post</span><strong>Thread · ${formatNumber(state.comments.filter(c=>!c.is_deleted).length)} respostas</strong></div>${postHTML(p)}<form class="composer" id="reply-form"><textarea id="reply" maxlength="280" placeholder="Responder com ate 280 caracteres" aria-label="Responder"></textarea><button class="btn primary" type="submit">Responder</button></form><section class="comments">${commentsHTML()}</section>`;}
async function load(){state.me=await api('/api/me');const id=postId();if(!id)throw new Error('Post nao informado');const [post,comments]=await Promise.all([api(`/api/community/posts/${encodeURIComponent(id)}`),api(`/api/community/posts/${encodeURIComponent(id)}/comments`)]);state.post=post;state.comments=comments;render();}
async function submitReply(e){e.preventDefault();const text=$('#reply').value.trim();if(!text||text.length>280)return;const btn=e.target.querySelector('button');btn.disabled=true;try{await api(`/api/community/posts/${encodeURIComponent(state.post.id)}/comments`,{method:'POST',body:JSON.stringify({content:text})});await load();}catch(err){toast(err.message);}finally{btn.disabled=false;}}
async function toggleLike(){const liked=Boolean(state.post.liked_by_me);state.post.liked_by_me=!liked;state.post.likes_count=Math.max(0,Number(state.post.likes_count||0)+(liked?-1:1));$('#like-count').textContent=formatNumber(state.post.likes_count);$('#like-count').classList.add('flip');try{await api(`/api/community/posts/${encodeURIComponent(state.post.id)}/like`,{method:liked?'DELETE':'POST'});}catch(e){toast(e.message);await load();}}
async function reportPost(){try{await api('/api/community/report',{method:'POST',body:JSON.stringify({content_type:'post',content_id:Number(state.post.id),reason:'other'})});toast('Denuncia enviada.');}catch(e){toast(e.message);}}
function editPost(){const view=$('#post-content-view');const old=state.post.content;view.innerHTML=`<textarea id="edit-text" maxlength="280" style="width:100%;min-height:120px;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-soft);color:var(--ink)">${escapeHTML(old)}</textarea><div class="actions"><button class="btn secondary" data-cancel-edit>Cancelar</button><button class="btn primary" data-save-edit>Salvar</button></div>`;}
async function saveEdit(){const text=$('#edit-text').value.trim();if(text.length<2||text.length>280)return toast('Texto invalido.');try{state.post=await api(`/api/community/posts/${encodeURIComponent(state.post.id)}`,{method:'PATCH',body:JSON.stringify({content:text})});render();toast('Post editado.');}catch(e){toast(e.message);}}
document.addEventListener('submit',e=>{if(e.target.matches('#reply-form'))submitReply(e);});
document.addEventListener('click',e=>{if(e.target.closest('[data-like]'))toggleLike();if(e.target.closest('[data-report]'))reportPost();if(e.target.closest('[data-copy]'))navigator.clipboard?.writeText(location.href).then(()=>toast('Link copiado.')).catch(()=>toast(location.href));if(e.target.closest('[data-edit]'))editPost();if(e.target.closest('[data-cancel-edit]'))render();if(e.target.closest('[data-save-edit]'))saveEdit();});
(async()=>{try{await load();}catch(e){$('#app').innerHTML=`<section class="empty"><h1>Post indisponivel</h1><p>${escapeHTML(e.message)}</p><a class="btn primary" href="community.html">Voltar</a></section>`;}})();
</script>
</body>
</html>

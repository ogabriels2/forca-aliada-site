name: Monitor Minecraft players

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update history snapshot
        env:
          MC_HOST: fa.ogabriels.com
        run: node scripts/monitor.mjs

      - name: Commit history changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/player-history.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update player history snapshot"
          git push

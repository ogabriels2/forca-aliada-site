<script>
(function(){
  const key='fa_theme';
  const token=localStorage.getItem('fa_token');
  function effective(t){return t==='dark'||(t==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}
  function apply(t){document.documentElement.setAttribute('data-theme', effective(t||localStorage.getItem(key)||'dark'));}
  apply();
  if(token){const syncTheme=()=>{fetch('https://forca-aliada-site.onrender.com/api/me/preferences',{headers:{Authorization:'Bearer '+token}}).then(r=>r.ok?r.json():null).then(p=>{if(p&&p.theme){localStorage.setItem(key,p.theme);apply(p.theme);}}).catch(()=>{});};(typeof requestIdleCallback==='function')?requestIdleCallback(syncTheme,{timeout:3000}):setTimeout(syncTheme,800);}
  matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change',()=>apply(localStorage.getItem(key)||'dark'));
})();
</script>
<style>

  20%, 60%  { transform: translateX(-5px); }

<body>

<header>
  <a href="index.html" class="brand-link">
    <img src="assets/images/app-icons/icon-192.png" onerror="this.src='https://minotar.net/helm/Steve/100.png'" alt="FA Logo" class="logo-img" width="100" height="100">
    <div class="logo-text">Força Aliada</div>
  </a>
  <div id="header-right">
    <a href="login.html" class="nav-cta">Fazer login</a>
  </div>
</header>

<div class="login-wrapper">
  <div class="card" id="recoverCard">

    <div id="step1">
      <div style="font-size: 48px; margin-bottom: 12px;">✉️</div>
      <h1>Recuperar Conta</h1>
      <p class="subtitle">Insira o e-mail associado à sua conta para receber o código de recuperação.</p>

      <form id="form-step1" onsubmit="requestReset(event)">
        <div class="form-group">
          <input id="email-input" type="email" placeholder="O seu e-mail" required>
        </div>
        <button type="submit" id="btn-step1" class="main-btn">Enviar Código</button>
      </form>
      <div id="msg1" class="msg" role="alert"></div>
    </div>

    <div id="step2">
      <div style="font-size: 48px; margin-bottom: 12px;">🔒</div>
      <h1>Criar Nova Senha</h1>
      <p class="subtitle">Enviámos um código de 6 dígitos para o seu e-mail. Ele expira em 15 minutos.</p>

      <form id="form-step2" onsubmit="submitReset(event)">
        <div class="form-group">
          <input id="code-input" class="pin-input" type="text" placeholder="000000" maxlength="6" autocomplete="off" required>
        </div>
        <div class="form-group">
          <input id="newpass-input" type="password" placeholder="Nova palavra-passe (mín. 8 caracteres)" minlength="8" required>
        </div>
        <button type="submit" id="btn-step2" class="main-btn">Redefinir Palavra-passe</button>
      </form>
      <div id="msg2" class="msg" role="alert"></div>
    </div>

    <div class="footer-text">
      Lembrou-se da senha? <a href="login.html">Voltar ao Login</a>
    </div>

  </div>
</div>

<script>
const API_BASE = 'https://forca-aliada-site.onrender.com';
const TOKEN_KEY = 'fa_token';
let userEmail = '';

// Verifica se já está logado, se sim, redireciona para o painel.
if (localStorage.getItem(TOKEN_KEY)) {
  window.location.replace('dashboard.html');
}

function showMessage(step, text, type) {
  const msgEl = document.getElementById(`msg${step}`);
  const card  = document.getElementById('recoverCard');
  msgEl.textContent = text;
  msgEl.className   = `msg ${type}`;
  if (type === 'error') {
    card.classList.remove('shake-animation');
    void card.offsetWidth; // Força o reflow
    card.classList.add('shake-animation');
  }
}

async function requestReset(event) {
  event.preventDefault();
  const email = document.getElementById('email-input').value.trim();
  const btn = document.getElementById('btn-step1');

  if (!email) { showMessage(1, 'Introduza o seu e-mail.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'A enviar...';

  try {
    const res = await fetch(`${API_BASE}/api/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao pedir código.');

    userEmail = email; // Guarda o email para o passo 2
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    
  } catch (err) {
    showMessage(1, err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Enviar Código';
  }
}

async function submitReset(event) {
  event.preventDefault();
  const code = document.getElementById('code-input').value.trim();
  const newPassword = document.getElementById('newpass-input').value;
  const btn = document.getElementById('btn-step2');

  if (!code || code.length !== 6) { showMessage(2, 'Introduza o código de 6 dígitos.', 'error'); return; }
  if (newPassword.length < 8) { showMessage(2, 'A palavra-passe tem de ter no mínimo 8 caracteres.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'A redefinir...';

  try {
    const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: userEmail, code, newPassword })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Código inválido ou expirado.');

    showMessage(2, 'Palavra-passe alterada com sucesso! A redirecionar...', 'success');
    setTimeout(() => { location.href = 'login.html'; }, 1500);
    
  } catch (err) {
    showMessage(2, err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Redefinir Palavra-passe';
  }
}
</script>
</body>

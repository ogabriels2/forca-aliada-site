<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Criar conta</title>
<style>body{margin:0;font-family:-apple-system;background:#f7f8fa;display:grid;place-items:center;min-height:100vh}.card{width:min(460px,92vw);background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:26px;box-shadow:0 20px 40px rgba(0,0,0,.06)}input{width:100%;padding:12px;border-radius:12px;border:1px solid #d1d5db;margin-top:10px}button{width:100%;padding:12px;border:none;border-radius:999px;margin-top:12px;background:#0f172a;color:#fff}.ghost{background:#e2e8f0;color:#0f172a}</style></head>
<body><div class="card"><h2>Criar conta</h2><input id="u" placeholder="Usuário"><input id="e" placeholder="E-mail"><input id="m" placeholder="Nome no Minecraft"><input id="p" type="password" placeholder="Senha"><button onclick="signup()">Criar conta</button><button class="ghost" onclick="location.href='login.html'">Fazer login</button><p id="msg"></p></div>
<script>function signup(){const users=JSON.parse(localStorage.getItem('fa_users')||'[]');const user={username:u.value.trim(),email:e.value.trim(),minecraft:m.value.trim(),password:p.value,role:'limited',photo:'logo.JPG'};if(!user.username||!user.email||!user.password)return msg.innerText='Preencha os campos obrigatórios.';if(users.some(x=>x.username===user.username||x.email===user.email))return msg.innerText='Usuário/e-mail já existe.';users.push(user);localStorage.setItem('fa_users',JSON.stringify(users));msg.innerText='Conta criada. Redirecionando...';setTimeout(()=>location.href='login.html',700);}</script></body></html>

<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Criar conta</title>
<style>body{margin:0;font-family:-apple-system;background:#f7f8fa;min-height:100vh}.header{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:10px;font-weight:700}.brand img{width:30px;height:30px;border-radius:8px}.center{display:grid;place-items:center;min-height:calc(100vh - 52px)}.card{width:min(460px,92vw);background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:26px;box-shadow:0 20px 40px rgba(0,0,0,.06)}input{width:100%;padding:12px;border-radius:12px;border:1px solid #d1d5db;margin-top:10px}button{width:100%;padding:12px;border:none;border-radius:999px;margin-top:12px;background:#0f172a;color:#fff}.ghost{background:#e2e8f0;color:#0f172a}</style></head>
<body><div class="header"><div class="brand"><img src="logo.JPG" alt=""><span>Força Aliada</span></div><a href="index.html">Início</a></div><div class="center"><div class="card"><h2>Criar conta</h2><input id="u" placeholder="Usuário"><input id="e" placeholder="E-mail"><input id="m" placeholder="Nome no Minecraft"><input id="p" type="password" placeholder="Senha"><button onclick="signup()">Criar conta</button><button class="ghost" onclick="location.href='login'">Fazer login</button><p id="msg"></p></div></div>
<script>async function signup(){const users=JSON.parse(localStorage.getItem('fa_users')||'[]');const user={username:u.value.trim(),email:e.value.trim(),minecraft:m.value.trim(),password:p.value,role:'limited',photo:'logo.JPG'};if(!user.username||!user.email||!user.password)return msg.innerText='Preencha os campos obrigatórios.';if(users.some(x=>x.username===user.username||x.email===user.email))return msg.innerText='Usuário/e-mail já existe.';users.push(user);localStorage.setItem('fa_users',JSON.stringify(users));try{await fetch(`${window.location.origin}/api/auth/signup`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.username,email:user.email,password:user.password,minecraftName:user.minecraft})});}catch{}msg.innerText='Conta criada. Redirecionando...';setTimeout(()=>location.href='login',700);}</script></body></html>

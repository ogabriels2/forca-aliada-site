<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Minha Conta</title><style>body{font-family:Arial;background:#0a1024;color:#fff;padding:24px}input{display:block;margin:8px 0;padding:10px;width:min(380px,100%)}button{padding:10px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px}</style><script src="web/auth.js"></script></head><body><a href="index.html">← Início</a> | <a href="dashboard.html">Dados</a> | <button onclick="logout()">Sair</button><h1>Personalização do perfil</h1><p id="info"></p><input id="display-name" placeholder="Nome de exibição"><input id="new-password" type="password" placeholder="Nova senha"><button onclick="save()">Salvar alterações</button><p id="msg"></p><script>const s=requireAuth();document.getElementById('info').innerText=`Conta: ${s.username}`;const users=getUsers();const me=users.find(u=>u.username===s.username);document.getElementById('display-name').value=me?.displayName||s.username;function save(){const users=getUsers();const me=users.find(u=>u.username===s.username);if(!me)return;me.displayName=document.getElementById('display-name').value.trim()||me.username;const np=document.getElementById('new-password').value.trim();if(np)me.password=np;saveUsers(users);setSession({...s,displayName:me.displayName});document.getElementById('msg').innerText='Perfil atualizado com sucesso.'}</script></body></html>

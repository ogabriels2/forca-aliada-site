<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dados do Servidor</title><style>body{font-family:Arial;background:#060b1b;color:#fff;padding:24px}a,button{color:#93c5fd}.box{background:#111a33;border-radius:14px;padding:16px;margin-top:16px}</style><script src="web/auth.js"></script></head><body><div><a href="index.html">← Início</a> | <a href="account.html">Minha conta</a> | <button onclick="logout()">Sair</button></div><h1>Relatórios do servidor</h1><p id="who"></p><div class="box"><h3>Online agora</h3><ul id="online"></ul></div><div class="box"><h3>Resumo do dia</h3><ul id="summary"></ul></div><div class="box"><h3>Histórico</h3><ul id="history"></ul></div><script>const s=requireAuth();document.getElementById('who').innerText=`Logado como ${s.displayName} (${s.role})`;async function load(){const r=await fetch('data/player-history.json?t='+Date.now());const d=await r.json();document.getElementById('online').innerHTML=(d.onlinePlayers||[]).map(n=>`<li>${n}</li>`).join('')||'<li>Sem jogadores.</li>';document.getElementById('summary').innerHTML=`<li>Entraram hoje: ${d.summary?.joinedToday||0}</li><li>Saíram hoje: ${d.summary?.leftToday||0}</li><li>Média de horas: ${d.summary?.avgHours||0}</li>`;const hist=(d.history||[]).slice(0,s.role==='full'?60:10);document.getElementById('history').innerHTML=hist.map(h=>`<li>${h.player}: ${h.enteredAt} → ${h.leftAt||'online'} (${h.hoursOnline||0}h)</li>`).join('')||'<li>Sem histórico.</li>'}load();</script></body></html>

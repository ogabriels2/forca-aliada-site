<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Painel | Força Aliada</title>
<style>body{margin:0;font-family:-apple-system;background:#f3f4f6;color:#0f172a;visibility:hidden}.header{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:10px;font-weight:700}.brand img{width:30px;height:30px;border-radius:8px}.wrap{max-width:1250px;margin:30px auto;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:20px;box-shadow:0 10px 35px rgba(0,0,0,.06);margin-top:16px}.grid{display:grid;grid-template-columns:320px 1fr;gap:16px}.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px}.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:.8rem}.online-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}.oc{border:1px solid #e5e7eb;border-radius:14px;padding:10px;background:#fafafa}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar > span{display:block;height:100%;background:#2563eb}.session-list{max-height:260px;overflow:auto}button{padding:10px 14px;border:none;border-radius:999px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}</style></head>
<body><div class="header"><div class="brand"><img src="assets/images/logo.JPG"><span>Força Aliada</span></div><a href="index.html">Início</a></div><div class="wrap"><div class="top"><h1>Painel da Staff</h1><button onclick="logout()">Sair</button></div>
<div class="grid"><div class="card"><h3>Perfil</h3><p><strong id="name"></strong></p><p id="email"></p><p>Minecraft: <strong id="mc"></strong></p><span id="role" class="pill"></span></div><div class="card"><h3>Visão Geral</h3><div class="mini-grid"><div><small>Status</small><h2 id="status-text">-</h2></div><div><small>Jogadores ativos</small><h2 id="online-count">0</h2></div></div><small id="meta"></small></div></div>
<div class="card"><h3>Conectados agora</h3><div id="online-cards" class="online-cards"></div></div>
<div class="card"><h3>Gráfico / Ranking por jogador (tempo total)</h3><div id="chart"></div></div>
<div class="card"><h3>Registro detalhado de sessões</h3><div id="sessions" class="session-list"></div></div>
</div>
<script>
const session=JSON.parse(localStorage.getItem('fa_session')||'null');
const apiToken=localStorage.getItem('fa_api_token')||'';
const ALLOWED_USERS=['gabalarca','admin','jaqueta','jaqueta_'];
if(!session||!apiToken) location.href='login';
async function bootstrapSession(){
  try{
    const r=await fetch(`${window.location.origin}/api/me`,{headers:{Authorization:'Bearer '+apiToken}});
    if(!r.ok) throw new Error();
    const me=await r.json();
    const username=String(me.username||'').toLowerCase();
    if(!ALLOWED_USERS.includes(username)){
      localStorage.removeItem('fa_session');localStorage.removeItem('fa_api_token');
      sessionStorage.setItem('fa_denied_msg','Você não tem permissão para acessar o painel da staff.');
      location.href='index.html';
      return;
    }
    localStorage.setItem('fa_session',JSON.stringify({username:me.username,email:me.email,minecraft:me.minecraft_name||me.minecraftName,role:me.role,photo:me.photo_url}));
    name.textContent=me.username||'-';email.textContent=me.email||'-';mc.textContent=me.minecraft_name||me.minecraftName||'-';role.textContent=me.role==='full'?'Acesso total':'Acesso limitado';
    document.body.style.visibility='visible';
  }catch{
    localStorage.removeItem('fa_session');localStorage.removeItem('fa_api_token');location.href='login';
  }
}
function logout(){localStorage.removeItem('fa_session');location.href='login';}
function hours(v){return Number(v||0)}
function formatDurationFromHours(h){let totalSeconds=Math.max(0,Math.round(Number(h||0)*3600));const days=Math.floor(totalSeconds/86400);totalSeconds%=86400;const hoursPart=Math.floor(totalSeconds/3600);totalSeconds%=3600;const minutes=Math.floor(totalSeconds/60);const seconds=totalSeconds%60;const parts=[];if(days)parts.push(`${days}d`);if(hoursPart)parts.push(`${hoursPart}h`);if(minutes)parts.push(`${minutes}min`);if(seconds||parts.length===0)parts.push(`${seconds}s`);return parts.join(' ')}
function buildPlayerStats(history){const stats={};for(const h of history||[]){if(!h.player)continue;const p=stats[h.player]||{player:h.player,totalHours:0,sessions:0};p.totalHours+=hours(h.hoursOnline);p.sessions+=1;stats[h.player]=p;}return Object.values(stats).map(p=>({...p,avg:p.sessions?+(p.totalHours/p.sessions).toFixed(2):0})).sort((a,b)=>b.totalHours-a.totalHours)}
function renderOnlineCards(names,statsMap){const box=document.getElementById('online-cards');if(!names.length){box.innerHTML='<div class="oc">Nenhum jogador online no momento.</div>';return;}box.innerHTML=names.map(n=>{const s=statsMap[n]||{totalHours:0,sessions:0,avg:0};return `<div class="oc"><strong>${n}</strong><div>Total logado: ${formatDurationFromHours(s.totalHours)}</div><div>Sessões: ${s.sessions}</div><div>Média/sessão: ${formatDurationFromHours(s.avg)}</div></div>`}).join('')}
function renderChart(stats){const max=Math.max(...stats.map(s=>s.totalHours),1);const c=document.getElementById('chart');c.innerHTML=stats.length?stats.map(s=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between"><strong>${s.player}</strong><span>${formatDurationFromHours(s.totalHours)}</span></div><div class="bar"><span style="width:${(s.totalHours/max)*100}%"></span></div></div>`).join(''):'Sem dados ainda.'}
function renderSessions(history){const el=document.getElementById('sessions');el.innerHTML=(history||[]).slice(0,500).map(h=>`<div style="padding:8px;border-bottom:1px dashed #e5e7eb"><strong>${h.player}</strong> — ${h.enteredAt||'-'} → ${h.leftAt||'online'} (${formatDurationFromHours(hours(h.hoursOnline))})</div>`).join('')||'Sem registros no histórico.'}
async function fetchLive(){try{const r=await fetch('/api/live-status');if(r.ok)return await r.json();}catch{}return {online:false,onlineCount:0,onlinePlayers:[]}}
async function fetchSnapshot(){try{if(apiToken){const r=await fetch(`${window.location.origin}/api/snapshots/latest`,{headers:{Authorization:'Bearer '+apiToken}});if(r.ok)return await r.json();}}catch{}const rr=await fetch('data/player-history.json?t='+Date.now());return await rr.json();}
async function refresh(){const [live,snap]=await Promise.all([fetchLive(),fetchSnapshot()]);const history=snap.history||[];const stats=buildPlayerStats(history);const map=Object.fromEntries(stats.map(s=>[s.player,s]));const onlinePlayers=(live.onlinePlayers&&live.onlinePlayers.length)?live.onlinePlayers:(snap.onlinePlayers||[]);document.getElementById('status-text').textContent=(live.online||onlinePlayers.length)?'Online':'Offline';document.getElementById('online-count').textContent=String(live.onlineCount||onlinePlayers.length||0);document.getElementById('meta').textContent='Atualizado: '+(snap.generatedAt||new Date().toISOString());renderOnlineCards(onlinePlayers,map);renderChart(stats);renderSessions(history);}
bootstrapSession();refresh();setInterval(refresh,10000);
</script></body></html>

<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Painel | Força Aliada</title>
<style>body{margin:0;font-family:-apple-system;background:#f3f4f6;color:#0f172a}.header{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:10px;font-weight:700}.brand img{width:30px;height:30px;border-radius:8px}.wrap{max-width:1200px;margin:30px auto;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:20px;box-shadow:0 10px 35px rgba(0,0,0,.06);margin-top:16px}.grid{display:grid;grid-template-columns:320px 1fr;gap:16px}img{width:70px;height:70px;border-radius:16px}.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:.8rem}ul{padding:0;list-style:none}li{padding:8px 0;border-bottom:1px dashed #e2e8f0}input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px;margin-top:8px}button{padding:10px 14px;border:none;border-radius:999px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.user-list li{cursor:pointer}</style></head>
<body><div class="header"><div class="brand"><img src="logo.JPG" alt=""><span>Força Aliada</span></div><a href="index.html">Início</a></div><div class="wrap"><div class="top"><h1>Painel da Staff</h1><button onclick="logout()">Sair</button></div><div class="grid"><div class="card"><h3>Perfil</h3><img id="photo" src="logo.JPG"><p><strong id="name"></strong></p><p id="email"></p><p>Minecraft: <strong id="mc"></strong></p><span id="role" class="pill"></span><h4>Alterar senha</h4><input id="newpass" type="password" placeholder="Nova senha"><button style="margin-top:8px" onclick="changePass()">Salvar senha</button><p id="profile-msg"></p></div><div class="card"><h3>Dados ao vivo e histórico</h3><p id="meta"></p><h4 id="online-title">Online agora</h4><ul id="online"></ul><h4>Histórico</h4><ul id="history"></ul></div></div><div id="owner-tools" class="card" style="display:none;"><h3>Painel proprietário (Gabalarca)</h3><div class="admin-grid"><div><h4>Contas registradas</h4><ul id="users-list" class="user-list"></ul></div><div><h4>Editar conta selecionada</h4><input id="edit-username" placeholder="Nome"><input id="edit-email" placeholder="E-mail"><input id="edit-minecraft" placeholder="Minecraft"><input id="edit-password" type="password" placeholder="Nova senha (opcional)"><button style="margin-top:8px" onclick="saveUserChanges()">Salvar alterações</button><p id="owner-msg"></p></div></div></div></div>
<script>
const session=JSON.parse(localStorage.getItem('fa_session')||'null'); if(!session) location.href='login.html';
const apiToken=localStorage.getItem('fa_api_token')||'';
let selectedUserIndex=-1;
let ownerUsersCache=[];
const isOwner=(session.username||'').toLowerCase()==='gabalarca'||(session.email||'').toLowerCase()==='gabalarcadsmoreira2016@gmail.com';
name.textContent=session.username; email.textContent=session.email||'Sem e-mail'; mc.textContent=session.minecraft||'-'; role.textContent=session.role==='full'?'Acesso completo':'Acesso limitado'; photo.src=session.photo||'logo.JPG';
if(isOwner){document.getElementById('owner-tools').style.display='block';}

async function fetchLiveNames(){
  try{const r=await fetch('https://api.mcstatus.io/v2/status/java/fa.ogabriels.com');const d=await r.json();if(!d.online)return {count:0,names:[]};const list=(d.players&&d.players.list)?d.players.list.map(p=>p.name_clean||p.name_raw||p.name).filter(Boolean):[];return {count:d.players?.online||list.length,names:list};}catch{return {count:0,names:[]};}
}

async function loadData(){
  try{
    let d=null;
    if(apiToken){const rr=await fetch('http://localhost:8787/api/snapshots/latest',{headers:{Authorization:'Bearer '+apiToken}});if(rr.ok)d=await rr.json();}
    if(!d){const r=await fetch('data/player-history.json?t='+Date.now());d=await r.json();}
    const live=await fetchLiveNames();
    const count=live.count||d.onlineCount||((d.onlinePlayers||[]).length);
    const names=live.names.length?live.names:(d.onlinePlayers||[]);
    meta.textContent='Última atualização: '+(d.generatedAt||'aguardando');
    document.getElementById('online-title').textContent=`Online agora (${count})`;
    online.innerHTML=names.length?names.map(n=>`<li>${n}</li>`).join(''):(count>0?`<li>${count} jogador(es) online (API sem nomes públicos).</li>`:'<li>Nenhum jogador online no momento.</li>');
    const rows=(d.history||[]).slice(0,session.role==='full'?120:8);
    history.innerHTML=rows.length?rows.map(h=>`<li><strong>${h.player}</strong> — ${fmt(h.enteredAt)} → ${h.leftAt?fmt(h.leftAt):'online'} (${h.hoursOnline||0}h)</li>`).join(''):'<li>Sem histórico ainda.</li>';
  }catch(e){meta.textContent='Falha ao carregar dados.';}
}
function fmt(v){if(!v)return '-';const dt=new Date(v);return dt.toLocaleString('pt-BR');}
function changePass(){const users=JSON.parse(localStorage.getItem('fa_users')||'[]');const idx=users.findIndex(u=>u.username===session.username&&u.email===session.email);if(idx<0)return;users[idx].password=newpass.value;localStorage.setItem('fa_users',JSON.stringify(users));session.password=newpass.value;localStorage.setItem('fa_session',JSON.stringify(session));document.getElementById('profile-msg').innerText='Senha alterada com sucesso.';}
function logout(){localStorage.removeItem('fa_session');location.href='login.html';}

function renderUsersList(){
  const users=ownerUsersCache.length?ownerUsersCache:JSON.parse(localStorage.getItem('fa_users')||'[]');
  const ul=document.getElementById('users-list');
  ul.innerHTML=users.map((u,i)=>`<li onclick="selectUser(${i})"><strong>${u.username}</strong><br><small>${u.email}</small></li>`).join('')||'<li>Nenhuma conta.</li>';
}
function selectUser(index){
  const users=ownerUsersCache.length?ownerUsersCache:JSON.parse(localStorage.getItem('fa_users')||'[]');
  const user=users[index]; if(!user) return;
  selectedUserIndex=index;
  document.getElementById('edit-username').value=user.username||'';
  document.getElementById('edit-email').value=user.email||'';
  document.getElementById('edit-minecraft').value=user.minecraft||user.minecraft_name||'';
  document.getElementById('edit-password').value='';
}
async function saveUserChanges(){
  if(!isOwner) return;
  const users=ownerUsersCache.length?ownerUsersCache:JSON.parse(localStorage.getItem('fa_users')||'[]');
  if(selectedUserIndex<0||!users[selectedUserIndex]) return document.getElementById('owner-msg').innerText='Selecione uma conta primeiro.';
  const u=users[selectedUserIndex];
  const payload={username:document.getElementById('edit-username').value.trim(),email:document.getElementById('edit-email').value.trim(),minecraftName:document.getElementById('edit-minecraft').value.trim(),newPassword:document.getElementById('edit-password').value};
  try{
    if(apiToken&&u.id){
      const r=await fetch(`http://localhost:8787/api/admin/users/${u.id}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+apiToken},body:JSON.stringify(payload)});
      if(!r.ok) throw new Error('api');
      await loadOwnerUsers();
    } else {
      u.username=payload.username;u.email=payload.email;u.minecraft=payload.minecraftName;if(payload.newPassword)u.password=payload.newPassword;
      users[selectedUserIndex]=u; localStorage.setItem('fa_users',JSON.stringify(users));
      ownerUsersCache=users;
    }
    document.getElementById('owner-msg').innerText='Conta atualizada com sucesso.';
    renderUsersList();
  }catch{document.getElementById('owner-msg').innerText='Falha ao salvar alterações.';}
}
async function loadOwnerUsers(){
  if(!isOwner) return;
  if(!apiToken){ownerUsersCache=JSON.parse(localStorage.getItem('fa_users')||'[]');renderUsersList();return;}
  try{
    const r=await fetch('http://localhost:8787/api/admin/users',{headers:{Authorization:'Bearer '+apiToken}});
    if(!r.ok) throw new Error();
    const users=await r.json();
    ownerUsersCache=users.map(u=>({id:u.id,username:u.username,email:u.email,minecraft:u.minecraft_name||'',role:u.role,photo:u.photo_url||'logo.JPG'}));
    renderUsersList();
  }catch{ownerUsersCache=JSON.parse(localStorage.getItem('fa_users')||'[]');renderUsersList();}
}
loadData();setInterval(loadData,15000);if(isOwner)loadOwnerUsers();
</script></body></html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Staff | Força Aliada</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --success: #34c759;
            --border: rgba(0, 0, 0, 0.08);
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar - Estilo Glassmorphism Apple */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 5%;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .navbar h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: var(--accent-hover); transform: scale(1.02); }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-outline:hover { background: rgba(0,0,0,0.04); }

        /* Layout Grid Principal */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Cartões (Cards) */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card h3 span {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Seção Perfil */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-img {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-md);
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .profile-info h2 { margin: 0; font-size: 18px; font-weight: 600; }
        .profile-info p { margin: 4px 0 0; font-size: 14px; color: var(--text-secondary); }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 980px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .pill.full { background: #e3f2fd; color: var(--accent); }
        .pill.limited { background: #f2f2f7; color: var(--text-secondary); }

        /* Formulários */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-color);
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        /* Grid Interno do Dashboard (Bento Box) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .mini-card {
            background: var(--bg-color);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .mini-card h4 { margin: 0 0 8px; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .mini-card .value { font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -1px; }

        /* Listas (Online e Histórico) */
        ul { padding: 0; margin: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
        
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-color);
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            transition: border 0.2s;
        }

        .list-item:hover { border-color: var(--border); background: #fff; }

        .mc-head {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #e5e5ea;
        }

        .item-details { flex: 1; }
        .item-details strong { display: block; font-size: 14px; margin-bottom: 2px; }
        .item-details span { font-size: 13px; color: var(--text-secondary); }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
        }

        .msg-alert {
            font-size: 13px;
            color: var(--success);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Responsividade */
        @media (max-width: 860px) {
            .container { grid-template-columns: 1fr; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>Força Aliada</h1>
        <button class="btn btn-outline" onclick="logout()">Encerrar Sessão</button>
    </nav>

    <div class="container">
        <div class="card">
            <div class="profile-header">
                <img id="photo" src="https://minotar.net/helm/Steve/100.png" class="profile-img" alt="Perfil">
                <div class="profile-info">
                    <h2 id="name">Carregando...</h2>
                    <span id="role" class="pill limited">Staff</span>
                </div>
            </div>
            
            <hr style="border:none; border-top: 1px solid var(--border); margin: 8px 0;">

            <div class="input-group">
                <label>Email de Contato</label>
                <p style="margin:0; font-size: 14px;" id="email">-</p>
            </div>
            
            <div class="input-group">
                <label>Conta Minecraft vinculada</label>
                <p style="margin:0; font-size: 14px; font-weight: 600;" id="mc">-</p>
            </div>

            <hr style="border:none; border-top: 1px solid var(--border); margin: 8px 0;">

            <h3>Segurança</h3>
            <div class="input-group">
                <input id="newpass" type="password" placeholder="Digite uma nova senha">
            </div>
            <button class="btn btn-primary" onclick="changePass()" style="width: 100%; margin-top: 8px;">Atualizar Credenciais</button>
            <div id="profile-msg" class="msg-alert"></div>
        </div>

        <div class="card">
            <h3>Visão Geral <span>Atualizado: <b id="meta">agora</b></span></h3>
            
            <div class="dashboard-grid">
                <div class="mini-card">
                    <h4>Status do Servidor</h4>
                    <div class="value" style="display: flex; align-items: center; gap: 8px;">
                        <span class="status-dot"></span> Online
                    </div>
                </div>
                <div class="mini-card">
                    <h4>Jogadores Ativos</h4>
                    <div class="value" id="online-count">0</div>
                </div>
            </div>

            <h3 style="margin-top: 16px;">Online Agora</h3>
            <ul id="online">
                </ul>

            <h3 style="margin-top: 16px;">Registro de Atividade</h3>
            <ul id="history">
                </ul>
        </div>
    </div>

<script>
    // 1. GESTÃO DE SESSÃO COM FALLBACK INTELIGENTE (Para fins de teste e design)
    let session = JSON.parse(localStorage.getItem('fa_session') || 'null'); 
    
    if(!session) {
        // Fallback: Se não houver sessão, cria uma falsa para você poder visualizar o design bonito
        // Em produção, descomente o location.href e apague a sessão mockada.
        session = { 
            username: "Administrador", 
            email: "admin@forcaaliada.com", 
            minecraft: "Notch", 
            role: "full", 
            photo: "" 
        };
        // location.href='login.html'; 
    }

    // 2. PREENCHIMENTO DO PERFIL
    const els = {
        name: document.getElementById('name'),
        email: document.getElementById('email'),
        mc: document.getElementById('mc'),
        role: document.getElementById('role'),
        photo: document.getElementById('photo'),
        online: document.getElementById('online'),
        history: document.getElementById('history'),
        meta: document.getElementById('meta'),
        onlineCount: document.getElementById('online-count')
    };

    els.name.textContent = session.username; 
    els.email.textContent = session.email || 'Não informado'; 
    els.mc.textContent = session.minecraft || 'Não vinculado'; 
    
    if(session.role === 'full') {
        els.role.textContent = 'Acesso Total';
        els.role.className = 'pill full';
    } else {
        els.role.textContent = 'Acesso Restrito';
        els.role.className = 'pill limited';
    }

    // Usa a API do Minotar para pegar a cabeça do jogador logado se não houver foto enviada
    els.photo.src = session.photo || (session.minecraft ? `https://minotar.net/helm/${session.minecraft}/100.png` : 'logo.JPG');

    // 3. CARREGAMENTO DE DADOS COM TRATAMENTO DE ERRO VISUAL
    async function loadData() {
        try {
            const r = await fetch('data/player-history.json?t=' + Date.now());
            if (!r.ok) throw new Error("Arquivo não encontrado");
            const d = await r.json();
            renderData(d);
        } catch(e) {
            // Em vez de só dar erro, geramos dados falsos bonitos para você ver o design em ação localmente
            const mockData = {
                generatedAt: new Date().toLocaleTimeString('pt-BR'),
                onlinePlayers: ["Jeb_", "Dinnerbone", session.minecraft],
                history: [
                    { player: "Herobrine", enteredAt: new Date(Date.now() - 3600000).toISOString(), leftAt: new Date().toISOString(), hoursOnline: 1.2 },
                    { player: "Alex", enteredAt: new Date(Date.now() - 86400000).toISOString(), leftAt: new Date(Date.now() - 80000000).toISOString(), hoursOnline: 1.8 }
                ]
            };
            renderData(mockData);
        }
    }

    function renderData(d) {
        els.meta.textContent = d.generatedAt || new Date().toLocaleTimeString('pt-BR');
        
        // Render Online Players
        const players = d.onlinePlayers || [];
        els.onlineCount.textContent = players.length;

        if(players.length) {
            els.online.innerHTML = players.map(n => `
                <li class="list-item">
                    <img src="https://minotar.net/helm/${n}/48.png" class="mc-head" alt="${n}">
                    <div class="item-details">
                        <strong>${n}</strong>
                        <span>Explorando o servidor</span>
                    </div>
                    <span class="status-dot"></span>
                </li>
            `).join('');
        } else {
            els.online.innerHTML = `<li class="list-item"><div class="item-details"><span>Nenhum jogador online no momento.</span></div></li>`;
        }

        // Render History
        const isFullAccess = session.role === 'full';
        const rows = (d.history || []).slice(0, isFullAccess ? 10 : 3);
        
        if(rows.length) {
            els.history.innerHTML = rows.map(h => `
                <li class="list-item">
                    <img src="https://minotar.net/helm/${h.player}/48.png" class="mc-head" style="width: 32px; height: 32px;" alt="${h.player}">
                    <div class="item-details">
                        <strong>${h.player}</strong>
                        <span>Conectou em ${fmt(h.enteredAt)}</span>
                    </div>
                    <div style="text-align: right;">
                        <strong style="font-size: 13px; color: var(--text-primary);">${h.hoursOnline ? h.hoursOnline + 'h' : 'Ao vivo'}</strong>
                        <br><span style="font-size: 11px; color: var(--text-secondary);">${h.leftAt ? 'Saiu: ' + fmt(h.leftAt) : 'Jogando agora'}</span>
                    </div>
                </li>
            `).join('');
        } else {
            els.history.innerHTML = `<li class="list-item"><div class="item-details"><span>Sem registros no histórico.</span></div></li>`;
        }
    }

    // Formatação de data mais limpa
    function fmt(v) {
        if(!v) return '-';
        const dt = new Date(v);
        return dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute:'2-digit' }) + ' de ' + dt.toLocaleDateString('pt-BR', {day: '2-digit', month: 'short'});
    }

    // 4. FUNÇÕES DE AÇÃO
    function changePass() {
        const passInput = document.getElementById('newpass');
        if(passInput.value.trim() === '') {
            showMsg('A senha não pode estar vazia.', 'var(--danger)');
            return;
        }

        const users = JSON.parse(localStorage.getItem('fa_users') || '[]');
        const idx = users.findIndex(u => u.username === session.username && u.email === session.email);
        
        if(idx >= 0) {
            users[idx].password = passInput.value;
            localStorage.setItem('fa_users', JSON.stringify(users));
        }
        
        session.password = passInput.value;
        localStorage.setItem('fa_session', JSON.stringify(session));
        
        passInput.value = '';
        showMsg('Credenciais atualizadas com segurança.', 'var(--success)');
    }

    function showMsg(text, color) {
        const msgEl = document.getElementById('profile-msg');
        msgEl.style.color = color;
        msgEl.innerText = text;
        setTimeout(() => msgEl.innerText = '', 4000);
    }

    function logout() {
        localStorage.removeItem('fa_session');
        location.href = 'login.html';
    }

    // Iniciar loop
    loadData();
    setInterval(loadData, 15000);
</script>
</body>
</html>

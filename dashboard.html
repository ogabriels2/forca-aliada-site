<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Painel | Força Aliada</title>
<style>body{margin:0;font-family:-apple-system;background:#f3f4f6;color:#0f172a}.wrap{max-width:1100px;margin:30px auto;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:20px;box-shadow:0 10px 35px rgba(0,0,0,.06);margin-top:16px}.grid{display:grid;grid-template-columns:320px 1fr;gap:16px}img{width:70px;height:70px;border-radius:16px}.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:.8rem}ul{padding:0;list-style:none}li{padding:8px 0;border-bottom:1px dashed #e2e8f0}input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px;margin-top:8px}button{padding:10px 14px;border:none;border-radius:999px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}</style></head>
<body><div class="wrap"><div class="top"><h1>Painel da Staff</h1><button onclick="logout()">Sair</button></div><div class="grid"><div class="card"><h3>Perfil</h3><img id="photo" src="logo.JPG"><p><strong id="name"></strong></p><p id="email"></p><p>Minecraft: <strong id="mc"></strong></p><span id="role" class="pill"></span><h4>Alterar senha</h4><input id="newpass" type="password" placeholder="Nova senha"><button style="margin-top:8px" onclick="changePass()">Salvar senha</button><p id="profile-msg"></p></div><div class="card"><h3>Dados ao vivo e histórico</h3><p id="meta"></p><h4>Online agora</h4><ul id="online"></ul><h4>Histórico</h4><ul id="history"></ul></div></div></div>
<script>
const session=JSON.parse(localStorage.getItem('fa_session')||'null'); if(!session) location.href='login.html';
const apiToken=localStorage.getItem('fa_api_token')||'';
name.textContent=session.username; email.textContent=session.email||'Sem e-mail'; mc.textContent=session.minecraft||'-'; role.textContent=session.role==='full'?'Acesso completo':'Acesso limitado'; photo.src=session.photo||'logo.JPG';
async function loadData(){try{let d=null;if(apiToken){const rr=await fetch('http://localhost:8787/api/snapshots/latest',{headers:{Authorization:'Bearer '+apiToken}});if(rr.ok)d=await rr.json();}if(!d){const r=await fetch('data/player-history.json?t='+Date.now());d=await r.json();}meta.textContent='Última atualização: '+(d.generatedAt||'aguardando');online.innerHTML=(d.onlinePlayers||[]).length?(d.onlinePlayers||[]).map(n=>`<li>${n}</li>`).join(''):'<li>Ninguém online.</li>';const rows=(d.history||[]).slice(0,session.role==='full'?80:8);history.innerHTML=rows.length?rows.map(h=>`<li><strong>${h.player}</strong> — ${fmt(h.enteredAt)} → ${h.leftAt?fmt(h.leftAt):'online'} (${h.hoursOnline||0}h)</li>`).join(''):'<li>Sem histórico ainda.</li>';}catch(e){meta.textContent='Falha ao carregar dados.';}}
function fmt(v){if(!v)return '-';const dt=new Date(v);return dt.toLocaleString('pt-BR');}
function changePass(){const users=JSON.parse(localStorage.getItem('fa_users')||'[]');const idx=users.findIndex(u=>u.username===session.username&&u.email===session.email);if(idx<0)return;users[idx].password=newpass.value;localStorage.setItem('fa_users',JSON.stringify(users));session.password=newpass.value;localStorage.setItem('fa_session',JSON.stringify(session));document.getElementById('profile-msg').innerText='Senha alterada com sucesso.';}
function logout(){localStorage.removeItem('fa_session');location.href='login.html';}
loadData();setInterval(loadData,15000);
</script></body></html>
